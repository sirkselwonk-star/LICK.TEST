<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lickalotapus in the Wild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Bebas+Neue&family=Oswald:wght@400;700&family=Raleway:wght@300;400;700&family=Permanent+Marker&family=Lobster&family=Righteous&family=Abril+Fatface&family=Shadows+Into+Light&family=Sacramento&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* ── Camera feed ── */
  #camera-feed {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }

  /* ── Three.js canvas ── */
  #ar-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 1; pointer-events: none;
  }

  /* ── Tap target ── */
  #tap-plane {
    position: fixed; inset: 0;
    z-index: 2; cursor: crosshair;
    display: none;
  }

  /* ══════════════════════════════════════
     LIGHTBOX — Model Selector Gallery
     ══════════════════════════════════════ */
  #model-lightbox {
    position: fixed; inset: 0;
    z-index: 100;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #model-lightbox.hidden { display: none; }

  /* Scanline overlay */
  #model-lightbox::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 101;
  }

  /* ── Lightbox Header ── */
  .lb-header {
    text-align: center;
    padding: 36px 20px 12px;
    border-bottom: 1px solid #1a1a1a;
    background: linear-gradient(180deg, #100800 0%, #0a0a0a 100%);
    flex-shrink: 0;
  }

  .lb-header h1 {
    font-size: clamp(1.2rem, 5vw, 2.2rem);
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    animation: neon-flicker 4s infinite alternate;
    text-shadow:
      0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff,
      0 0 42px #FF6B1A, 0 0 82px #FF6B1A,
      0 0 92px #FF6B1A, 0 0 102px #FF6B1A, 0 0 151px #FF6B1A;
  }

  @keyframes neon-flicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow:
        0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff,
        0 0 42px #FF6B1A, 0 0 82px #FF6B1A,
        0 0 92px #FF6B1A, 0 0 102px #FF6B1A, 0 0 151px #FF6B1A;
    }
    20%,24%,55% { text-shadow: none; }
  }

  .lb-header .sub {
    margin-top: 8px;
    font-size: 0.7rem;
    color: #665540;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .lb-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 16px;
    border: 1px solid #FF6B1A;
    border-radius: 40px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #FF6B1A;
    text-transform: uppercase;
  }

  /* ── Card Grid ── */
  .lb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    padding: 24px 20px 60px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Model Card ── */
  .model-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: #111;
    border: 1px solid #1a1a1a;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .model-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: #FF6B1A;
    box-shadow: 0 8px 32px rgba(255,107,26,0.22);
    z-index: 1;
  }

  .model-card:active {
    transform: scale(0.98);
  }

  /* Card preview area */
  .card-preview {
    width: 100%;
    aspect-ratio: 1;
    background: radial-gradient(ellipse at center, #1a1208 0%, #0a0a0a 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-preview canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Card tag badge */
  .card-tag-wrap {
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    z-index: 2;
    pointer-events: none;
    animation: tag-glow 2.2s ease-in-out infinite;
  }

  @keyframes tag-glow {
    0%,100% {
      filter:
        drop-shadow(0 0 4px #fff)
        drop-shadow(0 0 10px #FF6B1A)
        drop-shadow(0 0 22px #FF6B1A);
    }
    50% {
      filter:
        drop-shadow(0 0 2px #fff)
        drop-shadow(0 0 6px #FF6B1A);
    }
  }

  .card-tag {
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    background: #FF6B1A;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  .card-tag span {
    position: absolute;
    top: 24px; left: -6px;
    width: 76px;
    text-align: center;
    font-size: 0.6rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    color: #000;
    text-transform: uppercase;
    transform: rotate(-45deg);
  }

  /* Card info */
  .card-info {
    padding: 14px 14px 16px;
    border-top: 1px solid #1a1a1a;
  }

  .card-name {
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.12em;
    color: #FF6B1A;
    text-transform: uppercase;
  }

  .card-desc {
    margin-top: 6px;
    font-size: 0.68rem;
    color: #666;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .card-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .trait-pill {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #FFD600;
    border: 1px solid #332b00;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }



  /* ══════════════════════════════════════
     MAIN AR UI (shown after selection)
     ══════════════════════════════════════ */
  #ui {
    position: fixed; inset: 0;
    z-index: 10;
    pointer-events: none;
    display: none;
  }

  #ui.active { display: block; }

  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
    padding: 10px 12px 18px;
    text-align: center;
  }

  #header .title {
    font-size: 36px;
    letter-spacing: 5px;
    color: #FF6B1A;
    text-transform: uppercase;
    font-weight: bold;
    line-height: 1.3;
  }

  #header .sub { font-size: 22px; color: rgba(255,255,255,0.5); letter-spacing: 3px; margin-top: 4px; }

  #model-label {
    position: absolute;
    bottom: 68px; right: 14px;
    width: 120px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #FFD600;
    text-align: center;
    line-height: 1.3;
    text-shadow: 0 0 8px rgba(255,214,0,0.7), 0 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
  }

  /* ── Crosshair ── */
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    pointer-events: none;
    opacity: 0.35;
    transition: opacity 0.3s;
  }

  #crosshair.placed { opacity: 0; }

  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: #fff;
  }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }

  .ch-corner {
    position: absolute;
    width: 8px; height: 8px;
    border-color: #00E5CC;
    border-style: solid;
  }
  .ch-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .ch-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .ch-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .ch-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* ── Bottom Controls ── */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    padding: 20px 14px 12px;
    pointer-events: all;
  }

  #hint {
    position: absolute;
    top: 56px; left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* Aspect dropdown */
  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn, .btn.primary, .btn.danger {
    background: rgba(255,107,26,0.7);
    border: 1.5px solid rgba(255,136,68,0.7);
    color: #000;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover, .btn.primary:hover, .btn.danger:hover { background: rgba(255,136,68,0.8); border-color: rgba(255,160,96,0.8); }
  .btn:active, .btn.primary:active, .btn.danger:active { background: rgba(255,214,0,0.8); border-color: rgba(255,214,0,0.8); }

  /* Transform controls */
  /* ---- VISUAL CONTROLS: Compact unified cluster ---- */
  :root {
    --vc-bg: rgba(255,255,255,0.05);
    --vc-border: rgba(255,255,255,0.18);
    --vc-knob-bg: rgba(255,255,255,0.15);
    --vc-knob-border: rgba(255,255,255,0.4);
    --vc-accent: #00E5CC;
    --vc-accent-glow: rgba(0,229,204,0.5);
    --vc-track: rgba(255,255,255,0.12);
    --vc-text: rgba(255,255,255,0.3);
    --vc-font: 'Courier New', monospace;
  }

  #control-cluster {
    display: none !important;
  }
  #control-cluster * { pointer-events: all; }

  /* Collapse toggle */
  #control-collapse-btn {
    width: 100%;
    background: none; border: none;
    color: var(--vc-text);
    font-family: var(--vc-font);
    font-size: 8px; letter-spacing: 1px;
    padding: 2px 0 1px;
    cursor: pointer; text-transform: uppercase;
    text-align: center;
    transition: color 0.15s;
  }
  #control-collapse-btn:hover { color: rgba(255,255,255,0.6); }

  /* Collapsed state */
  #control-cluster.collapsed #control-grid { display: none; }
  #control-cluster.collapsed #reset-btn { display: none; }
  #control-cluster.collapsed .vc-label { display: none; }
  #control-cluster.collapsed { padding: 2px 6px; }

  /* ── Shared joystick base ── */
  .vc-joy {
    border-radius: 50%;
    background: var(--vc-bg);
    border: 1.5px solid var(--vc-border);
    touch-action: none;
    position: relative;
    flex-shrink: 0;
  }
  .vc-knob {
    position: absolute; border-radius: 50%;
    background: var(--vc-knob-bg);
    border: 1.5px solid var(--vc-knob-border);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease-out;
    pointer-events: none;
  }
  .vc-knob.dragging { transition: none; }

  /* ── Shared vertical slider base ── */
  .vc-slider {
    touch-action: none;
    position: relative;
    flex-shrink: 0;
    width: 18px;
  }
  .vc-slider-track {
    position: absolute; left: 50%; top: 0; bottom: 0;
    transform: translateX(-50%);
    width: 2px; background: var(--vc-track); border-radius: 2px;
  }
  .vc-slider-thumb {
    position: absolute; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--vc-knob-bg);
    border: 1.5px solid var(--vc-knob-border);
    cursor: grab; top: 50%;
  }
  .vc-slider-thumb.dragging { cursor: grabbing; }

  /* ── Horizontal slider variant ── */
  .vc-slider-h {
    touch-action: none;
    position: relative;
    flex-shrink: 0;
    height: 18px;
  }
  .vc-slider-h .vc-slider-track {
    position: absolute; top: 50%; left: 0; right: 0;
    transform: translateY(-50%);
    width: auto; height: 3px;
  }
  .vc-slider-h .vc-slider-thumb {
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    left: 50%;
  }

  /* ── Position L-shape (X horizontal, Z vertical at 90°) ── */
  #pos-axes {
    position: relative;
    width: 54px; height: 54px;
  }
  #pos-y-slider {
    position: absolute; left: 0; top: 0;
    width: 14px; height: 48px;
  }
  #pos-y-slider .vc-slider-track { left: 50%; }
  #pos-x-slider {
    position: absolute; bottom: 0; left: 6px;
    width: 48px; height: 14px;
  }
  #pos-axes::before, #pos-axes::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.08); pointer-events: none;
  }
  #pos-axes::before { width: 1px; height: 48px; left: 7px; top: 0; }
  #pos-axes::after { height: 1px; width: 48px; bottom: 7px; left: 6px; }
  /* Axis labels */
  #pos-x-label, #pos-y-label {
    position: absolute;
    font-family: var(--vc-font);
    font-size: 7px; color: var(--vc-accent);
    letter-spacing: 1px; pointer-events: none;
  }
  #pos-x-label { bottom: 2px; right: 0; }
  #pos-y-label { top: -2px; left: 2px; }

  /* ── Labels ── */
  .vc-label {
    font-family: var(--vc-font);
    font-size: 6px; letter-spacing: 1px;
    color: var(--vc-text); text-transform: uppercase;
    text-align: center; pointer-events: none;
    line-height: 1;
  }

  /* ── Specific sizes ── */
  /* Tilt joystick with rotation ring around it */
  #tilt-dial-combo {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
  }
  #rotation-dial {
    position: absolute; inset: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: transparent;
    border: 2px solid var(--vc-border);
    touch-action: none;
  }
  #dial-marker {
    position: absolute; top: 2px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--vc-accent);
    box-shadow: 0 0 4px var(--vc-accent-glow);
    pointer-events: none;
  }
  #dial-degrees {
    position: absolute; top: -6px; right: -10px;
    font-family: var(--vc-font); font-size: 6px;
    color: rgba(255,255,255,0.3); pointer-events: none;
  }
  #tilt-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
  }
  #tilt-knob { width: 12px; height: 12px; }

  #scale-slider-container { height: 48px; }
  #z-slider-container { width: 48px; height: 14px; }

  #control-grid {
    position: relative;
    width: 85px;
    height: 85px;
  }
  #grid-bl {
    position: absolute;
    bottom: 1px; left: 8px;
    z-index: 1;
  }
  #grid-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 3;
  }
  #grid-tr {
    position: absolute;
    top: 8px; right: 8px;
    text-align: center;
    z-index: 1;
  }

  /* Scale/Z inverted L (scale vertical on right, Z horizontal along top) */
  #sz-axes {
    position: relative;
    width: 54px; height: 54px;
  }
  #sz-axes #scale-slider-container {
    position: absolute; right: 0; top: 6px;
    width: 14px; height: 48px;
  }
  #sz-axes #z-slider-container {
    position: absolute; top: 0; left: 0;
    width: 48px; height: 14px;
  }
  #sz-axes::before, #sz-axes::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.08); pointer-events: none;
  }
  #sz-axes::before { width: 1px; height: 48px; right: 7px; top: 6px; }
  #sz-axes::after { height: 1px; width: 48px; top: 7px; left: 0; }
  #sz-scale-label, #sz-z-label {
    position: absolute;
    font-family: var(--vc-font);
    font-size: 7px; color: var(--vc-accent);
    letter-spacing: 1px; pointer-events: none;
  }
  #sz-scale-label { bottom: 0; right: 6px; }
  #sz-z-label { top: 2px; left: 0; }
  #sz-value-label {
    position: absolute;
    top: -8px; right: 10px;
    font-family: var(--vc-font);
    font-size: 6px; letter-spacing: 0.5px;
    color: var(--vc-text);
    pointer-events: none;
    white-space: nowrap;
  }

  #reset-btn {
    width: 100%;
    background: var(--vc-bg);
    border: 1px solid var(--vc-border);
    color: var(--vc-text);
    font-family: var(--vc-font);
    font-size: 6px; letter-spacing: 1px;
    padding: 2px 0; border-radius: 2px;
    cursor: pointer; text-transform: uppercase; text-align: center;
    transition: background 0.15s, color 0.15s;
    margin-top: 2px;
  }
  #reset-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }

  /* Placed badge */
  #placed-badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,229,204,0.15);
    border: 1px solid #00E5CC;
    color: #00E5CC;
    font-size: 10px;
    letter-spacing: 3px;
    padding: 6px 14px;
    border-radius: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  #placed-badge.show { opacity: 1; }

  /* ── Loading / Error Screens ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px; text-align: center;
    pointer-events: all;
  }

  #loading-screen { background: #000; z-index: 200; }
  #error-screen { background: rgba(0,0,0,0.9); z-index: 200; display: none; }

  .screen-icon { font-size: 52px; margin-bottom: 16px; }
  .screen-title {
    font-size: 14px; letter-spacing: 4px;
    color: #FF6B1A; text-transform: uppercase; margin-bottom: 10px;
  }
  .screen-sub {
    font-size: 11px; color: rgba(255,255,255,0.5);
    letter-spacing: 2px; line-height: 1.8; max-width: 300px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(255,107,26,0.2);
    border-top-color: #FF6B1A;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 20px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Flash ── */
  #flash {
    position: fixed; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none; z-index: 50;
    transition: opacity 0.08s;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .lb-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      padding: 16px 12px 40px;
    }
    .lb-header { padding: 24px 14px 10px; }
    .card-tag-wrap { width: 60px; height: 60px; }
    .card-tag { width: 60px; height: 60px; }
    .card-tag span { top: 16px; left: -8px; font-size: 0.5rem; }
  }

  @media (hover: none), (pointer: coarse) {
    .model-card:hover {
      transform: none;
      box-shadow: none;
      border-color: #1a1a1a;
    }
    .model-card:active {
      border-color: #FF6B1A;
      box-shadow: 0 4px 16px rgba(255,107,26,0.15);
      transform: scale(0.98);
    }
  }
  /* ── Keyboard shortcut legend ── */
  #shortcut-legend {
    position: fixed; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 8px 10px;
    pointer-events: none;
    opacity: 0.4; transition: opacity 0.3s;
    z-index: 11;
  }
  #shortcut-legend:hover { opacity: 0.9; pointer-events: all; }
  .legend-row { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
  .legend-row:last-child { margin-bottom: 0; }
  #shortcut-legend kbd {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px; padding: 1px 5px;
    font-family: 'Courier New', monospace; font-size: 10px;
