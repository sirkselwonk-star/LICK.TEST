<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lickalotapus in the Wild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Bebas+Neue&family=Oswald:wght@400;700&family=Raleway:wght@300;400;700&family=Permanent+Marker&family=Lobster&family=Righteous&family=Abril+Fatface&family=Shadows+Into+Light&family=Sacramento&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* ── Camera feed ── */
  #camera-feed {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }

  /* ── Three.js canvas ── */
  #ar-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 1; pointer-events: none;
  }

  /* ── Tap target ── */
  #tap-plane {
    position: fixed; inset: 0;
    z-index: 2; cursor: crosshair;
    display: none;
  }

  /* ══════════════════════════════════════
     LIGHTBOX — Model Selector Gallery
     ══════════════════════════════════════ */
  #model-lightbox {
    position: fixed; inset: 0;
    z-index: 100;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #model-lightbox.hidden { display: none; }

  /* Scanline overlay */
  #model-lightbox::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 101;
  }

  /* ── Lightbox Header ── */
  .lb-header {
    text-align: center;
    padding: 36px 20px 12px;
    border-bottom: 1px solid #1a1a1a;
    background: linear-gradient(180deg, #100800 0%, #0a0a0a 100%);
    flex-shrink: 0;
  }

  .lb-header h1 {
    font-size: clamp(1.2rem, 5vw, 2.2rem);
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    animation: neon-flicker 4s infinite alternate;
    text-shadow:
      0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff,
      0 0 42px #FF6B1A, 0 0 82px #FF6B1A,
      0 0 92px #FF6B1A, 0 0 102px #FF6B1A, 0 0 151px #FF6B1A;
  }

  @keyframes neon-flicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow:
        0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff,
        0 0 42px #FF6B1A, 0 0 82px #FF6B1A,
        0 0 92px #FF6B1A, 0 0 102px #FF6B1A, 0 0 151px #FF6B1A;
    }
    20%,24%,55% { text-shadow: none; }
  }

  .lb-header .sub {
    margin-top: 8px;
    font-size: 0.7rem;
    color: #665540;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .lb-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 16px;
    border: 1px solid #FF6B1A;
    border-radius: 40px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #FF6B1A;
    text-transform: uppercase;
  }

  /* ── Card Grid ── */
  .lb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    padding: 24px 20px 60px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Model Card ── */
  .model-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: #111;
    border: 1px solid #1a1a1a;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .model-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: #FF6B1A;
    box-shadow: 0 8px 32px rgba(255,107,26,0.22);
    z-index: 1;
  }

  .model-card:active {
    transform: scale(0.98);
  }

  /* Card preview area */
  .card-preview {
    width: 100%;
    aspect-ratio: 1;
    background: radial-gradient(ellipse at center, #1a1208 0%, #0a0a0a 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-preview canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Card tag badge */
  .card-tag-wrap {
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    z-index: 2;
    pointer-events: none;
    animation: tag-glow 2.2s ease-in-out infinite;
  }

  @keyframes tag-glow {
    0%,100% {
      filter:
        drop-shadow(0 0 4px #fff)
        drop-shadow(0 0 10px #FF6B1A)
        drop-shadow(0 0 22px #FF6B1A);
    }
    50% {
      filter:
        drop-shadow(0 0 2px #fff)
        drop-shadow(0 0 6px #FF6B1A);
    }
  }

  .card-tag {
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    background: #FF6B1A;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  .card-tag span {
    position: absolute;
    top: 24px; left: -6px;
    width: 76px;
    text-align: center;
    font-size: 0.6rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    color: #000;
    text-transform: uppercase;
    transform: rotate(-45deg);
  }

  /* Card info */
  .card-info {
    padding: 14px 14px 16px;
    border-top: 1px solid #1a1a1a;
  }

  .card-name {
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.12em;
    color: #FF6B1A;
    text-transform: uppercase;
  }

  .card-desc {
    margin-top: 6px;
    font-size: 0.68rem;
    color: #666;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .card-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .trait-pill {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #FFD600;
    border: 1px solid #332b00;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }

  /* Select button */
  .card-select-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 8px;
    background: rgba(255,107,26,0.1);
    border: 1px solid rgba(255,107,26,0.3);
    color: #FF6B1A;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s, border-color 0.15s;
  }

  .card-select-btn:hover {
    background: #FF6B1A;
    border-color: #FF6B1A;
    color: #000;
  }

  /* ── Upload Card ── */
  .upload-card .card-preview {
    background: radial-gradient(ellipse at center, #0a1a0c 0%, #0a0a0a 70%);
    flex-direction: column;
    gap: 10px;
  }

  .upload-icon { font-size: 48px; opacity: 0.6; }
  .upload-text {
    font-size: 0.7rem;
    color: #00E5CC;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .upload-card:hover .upload-icon { opacity: 1; }
  .upload-card:hover .upload-text { opacity: 1; }

  .upload-card:hover {
    border-color: #00E5CC;
    box-shadow: 0 8px 32px rgba(0,229,204,0.22);
  }

  .upload-card .card-select-btn {
    background: rgba(0,229,204,0.1);
    border-color: rgba(0,229,204,0.3);
    color: #00E5CC;
  }

  .upload-card .card-select-btn:hover {
    background: #00E5CC;
    border-color: #00E5CC;
    color: #000;
  }

  .drag-over .card-preview {
    background: radial-gradient(ellipse at center, #0a2a1c 0%, #0a0a0a 70%);
  }

  #glb-file-input { display: none; }

  /* ══════════════════════════════════════
     MAIN AR UI (shown after selection)
     ══════════════════════════════════════ */
  #ui {
    position: fixed; inset: 0;
    z-index: 10;
    pointer-events: none;
    display: none;
  }

  #ui.active { display: block; }

  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
    padding: 10px 12px 18px;
    text-align: center;
  }

  #header .title {
    font-size: 28px;
    letter-spacing: 5px;
    color: #FF6B1A;
    text-transform: uppercase;
    font-weight: bold;
    line-height: 1.3;
  }

  #header .sub { font-size: 16px; color: rgba(255,255,255,0.5); letter-spacing: 3px; margin-top: 2px; }

  #model-label {
    position: absolute;
    bottom: 32px; left: 14px;
    font-size: 9px;
    letter-spacing: 2px;
    color: #FFD600;
    text-align: left;
    line-height: 1.3;
    pointer-events: none;
  }

  /* ── Crosshair ── */
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    pointer-events: none;
    opacity: 0.35;
    transition: opacity 0.3s;
  }

  #crosshair.placed { opacity: 0; }

  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: #fff;
  }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }

  .ch-corner {
    position: absolute;
    width: 8px; height: 8px;
    border-color: #00E5CC;
    border-style: solid;
  }
  .ch-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .ch-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .ch-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .ch-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* ── Bottom Controls ── */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    padding: 20px 14px 12px;
    pointer-events: all;
  }

  #hint {
    position: absolute;
    top: 56px; left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* Aspect dropdown */
  #aspect-dropdown {
    position: absolute;
    top: 72px; left: 12px;
    pointer-events: all;
    z-index: 11;
  }
  #aspect-toggle {
    background: rgba(80,50,140,0.5);
    border: 1px solid rgba(140,100,220,0.6);
    color: rgba(200,170,255,0.9);
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 1px; padding: 3px 10px; border-radius: 3px;
    cursor: pointer; text-transform: uppercase;
    transition: all 0.15s;
  }
  #aspect-toggle:hover { background: rgba(100,60,170,0.6); color: #D4AAFF; }
  #aspect-menu {
    display: none;
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
    background: rgba(10,10,15,0.9);
    border: 1px solid rgba(180,130,255,0.3);
    border-radius: 4px;
    padding: 4px;
    flex-direction: column; gap: 2px;
    backdrop-filter: blur(6px);
    left: 0;
    transform: none;
  }
  #aspect-menu.open { display: flex; }
  .aspect-btn {
    background: rgba(80,50,140,0.4);
    border: 1px solid rgba(140,100,220,0.5);
    color: rgba(200,170,255,0.8);
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 1px; padding: 4px 14px; border-radius: 2px;
    cursor: pointer; text-transform: uppercase; transition: all 0.15s;
    white-space: nowrap;
  }
  .aspect-btn:hover { background: rgba(100,60,170,0.5); color: #D4AAFF; }
  .aspect-btn.active {
    background: rgba(120,70,200,0.6);
    border-color: #B482FF; color: #fff;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: rgba(255,255,255,0.18); }
  .btn:active { background: rgba(255,255,255,0.25); }
  .btn.primary { background: #FF6B1A; border-color: #FF6B1A; color: #000; font-weight: bold; }
  .btn.primary:hover { background: #FF8844; }
  .btn.primary:active { background: #FFD600; border-color: #FFD600; }
  .btn.danger { border-color: rgba(255,80,80,0.5); color: rgba(255,80,80,0.8); }
  .btn.danger:hover { background: rgba(255,80,80,0.15); }

  /* Transform controls */
  /* ---- VISUAL CONTROLS: Compact unified cluster ---- */
  :root {
    --vc-bg: rgba(255,255,255,0.05);
    --vc-border: rgba(255,255,255,0.18);
    --vc-knob-bg: rgba(255,255,255,0.15);
    --vc-knob-border: rgba(255,255,255,0.4);
    --vc-accent: #00E5CC;
    --vc-accent-glow: rgba(0,229,204,0.5);
    --vc-track: rgba(255,255,255,0.12);
    --vc-text: rgba(255,255,255,0.3);
    --vc-font: 'Courier New', monospace;
  }

  #control-cluster {
    position: absolute;
    bottom: 10px; right: 10px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0px;
    z-index: 12;
    pointer-events: none;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--vc-border);
    border-radius: 8px;
    padding: 2px 3px 2px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 6px;
    transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
    overflow: hidden;
  }
  #control-cluster.show { display: inline-flex; }
  #control-cluster * { pointer-events: all; }

  /* Collapse toggle */
  #control-collapse-btn {
    width: 100%;
    background: none; border: none;
    color: var(--vc-text);
    font-family: var(--vc-font);
    font-size: 8px; letter-spacing: 1px;
    padding: 2px 0 1px;
    cursor: pointer; text-transform: uppercase;
    text-align: center;
    transition: color 0.15s;
  }
  #control-collapse-btn:hover { color: rgba(255,255,255,0.6); }

  /* Collapsed state */
  #control-cluster.collapsed #control-grid { display: none; }
  #control-cluster.collapsed #reset-btn { display: none; }
  #control-cluster.collapsed .vc-label { display: none; }
  #control-cluster.collapsed { padding: 2px 6px; }

  /* ── Shared joystick base ── */
  .vc-joy {
    border-radius: 50%;
    background: var(--vc-bg);
    border: 1.5px solid var(--vc-border);
    touch-action: none;
    position: relative;
    flex-shrink: 0;
  }
  .vc-knob {
    position: absolute; border-radius: 50%;
    background: var(--vc-knob-bg);
    border: 1.5px solid var(--vc-knob-border);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease-out;
    pointer-events: none;
  }
  .vc-knob.dragging { transition: none; }

  /* ── Shared vertical slider base ── */
  .vc-slider {
    touch-action: none;
    position: relative;
    flex-shrink: 0;
    width: 18px;
  }
  .vc-slider-track {
    position: absolute; left: 50%; top: 0; bottom: 0;
    transform: translateX(-50%);
    width: 2px; background: var(--vc-track); border-radius: 2px;
  }
  .vc-slider-thumb {
    position: absolute; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--vc-knob-bg);
    border: 1.5px solid var(--vc-knob-border);
    cursor: grab; top: 50%;
  }
  .vc-slider-thumb.dragging { cursor: grabbing; }

  /* ── Horizontal slider variant ── */
  .vc-slider-h {
    touch-action: none;
    position: relative;
    flex-shrink: 0;
    height: 18px;
  }
  .vc-slider-h .vc-slider-track {
    position: absolute; top: 50%; left: 0; right: 0;
    transform: translateY(-50%);
    width: auto; height: 3px;
  }
  .vc-slider-h .vc-slider-thumb {
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    left: 50%;
  }

  /* ── Position L-shape (X horizontal, Z vertical at 90°) ── */
  #pos-axes {
    position: relative;
    width: 54px; height: 54px;
  }
  #pos-y-slider {
    position: absolute; left: 0; top: 0;
    width: 14px; height: 48px;
  }
  #pos-y-slider .vc-slider-track { left: 50%; }
  #pos-x-slider {
    position: absolute; bottom: 0; left: 6px;
    width: 48px; height: 14px;
  }
  #pos-axes::before, #pos-axes::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.08); pointer-events: none;
  }
  #pos-axes::before { width: 1px; height: 48px; left: 7px; top: 0; }
  #pos-axes::after { height: 1px; width: 48px; bottom: 7px; left: 6px; }
  /* Axis labels */
  #pos-x-label, #pos-y-label {
    position: absolute;
    font-family: var(--vc-font);
    font-size: 7px; color: var(--vc-accent);
    letter-spacing: 1px; pointer-events: none;
  }
  #pos-x-label { bottom: 2px; right: 0; }
  #pos-y-label { top: -2px; left: 2px; }

  /* ── Labels ── */
  .vc-label {
    font-family: var(--vc-font);
    font-size: 6px; letter-spacing: 1px;
    color: var(--vc-text); text-transform: uppercase;
    text-align: center; pointer-events: none;
    line-height: 1;
  }

  /* ── Specific sizes ── */
  /* Tilt joystick with rotation ring around it */
  #tilt-dial-combo {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
  }
  #rotation-dial {
    position: absolute; inset: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: transparent;
    border: 2px solid var(--vc-border);
    touch-action: none;
  }
  #dial-marker {
    position: absolute; top: 2px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--vc-accent);
    box-shadow: 0 0 4px var(--vc-accent-glow);
    pointer-events: none;
  }
  #dial-degrees {
    position: absolute; top: -6px; right: -10px;
    font-family: var(--vc-font); font-size: 6px;
    color: rgba(255,255,255,0.3); pointer-events: none;
  }
  #tilt-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
  }
  #tilt-knob { width: 12px; height: 12px; }

  #scale-slider-container { height: 48px; }
  #z-slider-container { width: 48px; height: 14px; }

  #control-grid {
    position: relative;
    width: 85px;
    height: 85px;
  }
  #grid-bl {
    position: absolute;
    bottom: 1px; left: 8px;
    z-index: 1;
  }
  #grid-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 3;
  }
  #grid-tr {
    position: absolute;
    top: 8px; right: 8px;
    text-align: center;
    z-index: 1;
  }

  /* Scale/Z inverted L (scale vertical on right, Z horizontal along top) */
  #sz-axes {
    position: relative;
    width: 54px; height: 54px;
  }
  #sz-axes #scale-slider-container {
    position: absolute; right: 0; top: 6px;
    width: 14px; height: 48px;
  }
  #sz-axes #z-slider-container {
    position: absolute; top: 0; left: 0;
    width: 48px; height: 14px;
  }
  #sz-axes::before, #sz-axes::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.08); pointer-events: none;
  }
  #sz-axes::before { width: 1px; height: 48px; right: 7px; top: 6px; }
  #sz-axes::after { height: 1px; width: 48px; top: 7px; left: 0; }
  #sz-scale-label, #sz-z-label {
    position: absolute;
    font-family: var(--vc-font);
    font-size: 7px; color: var(--vc-accent);
    letter-spacing: 1px; pointer-events: none;
  }
  #sz-scale-label { bottom: 0; right: 6px; }
  #sz-z-label { top: 2px; left: 0; }
  #sz-value-label {
    position: absolute;
    top: -8px; right: 10px;

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════
// MODEL VARIANT DATA
// ═══════════════════════════════════════════════════
const MODELS = [
  {
    id: 'og',
    name: 'OG Lick',
    tag: 'CLASSIC',
    desc: 'The original goggle-eyed beaver. Long tongue, zero shame. The one that started it all.',
    traits: ['ORANGE', 'PINK TONGUE', 'CLASSIC'],
    colors: { body: 0xFF6B1A, tongue: 0xFF69B4, eyes: 0xFFFFFF, pupil: 0x222222, tail: 0xFFD600, accent: null }
  },
  {
    id: 'prison',
    name: 'Prison Lick',
    tag: 'PRISON',
    desc: 'Fresh out of solitary. Striped jumpsuit, ball & chain. Still smuggling contraband.',
    traits: ['STRIPES', 'BALL & CHAIN', 'CONTRABAND'],
    colors: { body: 0xCC5500, tongue: 0xFF69B4, eyes: 0xFFFFFF, pupil: 0x222222, tail: 0x888888, accent: 0x222222 }
  },
  {
    id: 'slime',
    name: 'Slime Lick',
    tag: 'SLIME',
    desc: 'Oozing with green slime energy. Dripping, glowing, absolutely unhinged.',
    traits: ['TOXIC GREEN', 'OOZE', 'SLIME MODE'],
    colors: { body: 0x00FF88, tongue: 0x88FF44, eyes: 0xCCFFCC, pupil: 0x004400, tail: 0x44CC44, accent: null }
  },
  {
    id: 'gold',
    name: 'Gold Lick',
    tag: 'LEGENDARY',
    desc: 'Gilded and glorious. The rarest Lickalotapus. Flex it or lose it.',
    traits: ['24K GOLD', 'CROWN', 'LEGENDARY'],
    colors: { body: 0xFFD700, tongue: 0xFFA500, eyes: 0xFFF8DC, pupil: 0x8B6914, tail: 0xDAA520, accent: 0xFFD700 }
  },
  {
    id: 'neon',
    name: 'Neon Lick',
    tag: 'NEON',
    desc: 'Cyberpunk fever dream. Glows in the dark. Probably radioactive.',
    traits: ['TEAL GLOW', 'HOT PINK', 'CYBERPUNK'],
    colors: { body: 0x00E5CC, tongue: 0xFF1493, eyes: 0xFFFFFF, pupil: 0xFF00FF, tail: 0x00FFFF, accent: null }
  }
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let scene, camera, renderer, clock;
let modelGroup = null;
let selectedModel = null;
let customGLBBlob = null;
let placed = false;
let transformMode = 'move';
let lastTouch = null;
let pinchDist0 = null;
let modelScale0 = 1;
let modelRotY0 = 0;
let previewScenes = [];

const GLTF_CDN = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════
// BUILD LICKALOTAPUS PLACEHOLDER (per variant)
// ═══════════════════════════════════════════════════
function buildLickalotapus(c, targetScene) {
  var group = new THREE.Group();
  var bodyMat  = new THREE.MeshLambertMaterial({ color: c.body });
  var tongMat  = new THREE.MeshLambertMaterial({ color: c.tongue });
  var eyeMat   = new THREE.MeshLambertMaterial({ color: c.eyes });
  var pupilMat = new THREE.MeshLambertMaterial({ color: c.pupil });
  var tailMat  = new THREE.MeshLambertMaterial({ color: c.tail });

  // Body
  var body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.35), bodyMat);
  body.position.y = 0.3; body.castShadow = true;
  group.add(body);

  // Prison stripes
  if (c.accent !== null && c.accent !== undefined) {
    var stripeMat = new THREE.MeshLambertMaterial({ color: c.accent });
    for (var sy = -0.05; sy <= 0.25; sy += 0.1) {
      var stripe = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.04, 0.36), stripeMat);
      stripe.position.set(0, sy + 0.3, 0);
      group.add(stripe);
    }
  }

  // Head
  var head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.38, 0.32), bodyMat);
  head.position.set(0, 0.78, 0.05); head.castShadow = true;
  group.add(head);

  // Eyes
  [-0.1, 0.1].forEach(function(x) {
    var eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.05), eyeMat);
    eye.position.set(x, 0.84, 0.19);
    group.add(eye);
    var pupil = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.03), pupilMat);
    pupil.position.set(x, 0.84, 0.22);
    group.add(pupil);
  });

  // Tongue
  var tongue = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.35, 0.04), tongMat);
  tongue.position.set(0, 0.56, 0.19);
  tongue.userData.isTongue = true;
  group.add(tongue);

  // Forked tip
  [-0.06, 0.06].forEach(function(x) {
    var tip = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.1, 0.04), tongMat);
    tip.position.set(x, 0.36, 0.19);
    group.add(tip);
  });

  // Arms
  [{ x: -0.32, rz: 0.4 }, { x: 0.32, rz: -0.4 }].forEach(function(a) {
    var arm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.3, 0.12), bodyMat);
    arm.position.set(a.x, 0.22, 0); arm.rotation.z = a.rz; arm.castShadow = true;
    group.add(arm);
  });

  // Legs
  [-0.15, 0.15].forEach(function(x) {
    var leg = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.25, 0.14), bodyMat);
    leg.position.set(x, 0.01, 0); leg.castShadow = true;
    group.add(leg);
  });

  // Tail
  var tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 0.4), tailMat);
  tail.position.set(0, 0.22, -0.32); tail.rotation.x = 0.3;
  group.add(tail);

  // Gold crown
  if (c.body === 0xFFD700) {
    var crownMat = new THREE.MeshLambertMaterial({ color: 0xFFD700 });
    var base = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.06, 0.2), crownMat);
    base.position.set(0, 1.0, 0.05);
    group.add(base);
    [-0.1, 0, 0.1].forEach(function(x) {
      var spike = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.06), crownMat);
      spike.position.set(x, 1.08, 0.05);
      group.add(spike);
    });
  }

  // Prison ball & chain
  if (c.accent === 0x222222) {
    var chainMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
    var ball = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), chainMat);
    ball.position.set(0.3, 0.08, 0);
    group.add(ball);
    var chain = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.2), chainMat);
    chain.position.set(0.22, 0.08, 0);
    group.add(chain);
  }

  if (targetScene) targetScene.add(group);
  return group;
}

// ═══════════════════════════════════════════════════
// CARD PREVIEW RENDERERS
// ═══════════════════════════════════════════════════
function initCardPreviews() {
  MODELS.forEach(function(m, i) {
    var card = document.getElementById('card-' + m.id);
    if (!card) return;
    var cvs = card.querySelector('canvas');
    if (!cvs) return;

    var pScene = new THREE.Scene();
    var pCam = new THREE.PerspectiveCamera(50, 1, 0.01, 50);
    pCam.position.set(0, 0.7, 2.0);
    pCam.lookAt(0, 0.45, 0);

    var pRenderer = new THREE.WebGLRenderer({ canvas: cvs, alpha: true, antialias: true });
    pRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    pRenderer.setSize(cvs.clientWidth, cvs.clientHeight);

    var amb = new THREE.AmbientLight(0xffffff, 0.7);
    pScene.add(amb);
    var dir = new THREE.DirectionalLight(0xfff5e0, 1.2);
    dir.position.set(3, 8, 5);
    pScene.add(dir);

    var lickGroup = buildLickalotapus(m.colors, pScene);
    previewScenes.push({ scene: pScene, camera: pCam, renderer: pRenderer, model: lickGroup, clock: new THREE.Clock() });
  });
}

function animatePreviews() {
  requestAnimationFrame(animatePreviews);
  previewScenes.forEach(function(p) {
    var t = p.clock.getElapsedTime();
    p.model.rotation.y = Math.sin(t * 0.6) * 0.4;
    p.model.position.y = Math.sin(t * 1.5) * 0.015;
    p.model.children.forEach(function(child) {
      if (child.userData.isTongue) child.rotation.z = Math.sin(t * 3) * 0.15;
    });
    p.renderer.render(p.scene, p.camera);
  });
}

// ═══════════════════════════════════════════════════
// GLB LOADING
// ═══════════════════════════════════════════════════
async function ensureGLTFLoader() {
  if (window.THREE_GLTFLoader) return;
  await new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = GLTF_CDN;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  window.THREE = THREE;
  window.THREE_GLTFLoader = THREE.GLTFLoader || window.THREE.GLTFLoader;
}

async function loadGLBFromBlob(blob) {
  await ensureGLTFLoader();
  var url = URL.createObjectURL(blob);
  return new Promise(function(resolve, reject) {
    var Loader = window.THREE_GLTFLoader || (window.THREE && window.THREE.GLTFLoader);
    if (!Loader) { reject(new Error('GLTFLoader not available')); return; }
    var loader = new Loader();
    loader.load(url, function(gltf) {
      URL.revokeObjectURL(url);
      resolve(gltf);
    }, undefined, function(err) {
      URL.revokeObjectURL(url);
      reject(err);
    });
  });
}

async function spawnGLBModel(blob, position) {
  if (modelGroup) { scene.remove(modelGroup); modelGroup = null; }
  var gltf;
  try { gltf = await loadGLBFromBlob(blob); } catch(e) {
    setHint('Failed to load GLB: ' + e.message);
    return;
  }
  var model = gltf.scene;
  var box = new THREE.Box3().setFromObject(model);
  var size = box.getSize(new THREE.Vector3());
  var maxDim = Math.max(size.x, size.y, size.z);
  model.scale.setScalar(1.0 / maxDim);
  var box2 = new THREE.Box3().setFromObject(model);
  model.position.y -= box2.min.y;
  model.traverse(function(child) {
    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
  });
  modelGroup = new THREE.Group();
  modelGroup.add(model);
  modelGroup.position.copy(position);
  scene.add(modelGroup);
}

// ═══════════════════════════════════════════════════
// MAIN THREE.JS SCENE
// ═══════════════════════════════════════════════════
async function init() {
  scene = new THREE.Scene();
  clock = new THREE.Clock();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(0, 1.6, 0);

  var canvas = document.getElementById('ar-canvas');
  renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.outputEncoding = THREE.sRGBEncoding;

  var ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);
  var sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
  sun.position.set(3, 8, 5); sun.castShadow = true;
  scene.add(sun);
  var fill = new THREE.DirectionalLight(0xc0e8ff, 0.4);
  fill.position.set(-4, 2, -3);
  scene.add(fill);

  var shadowGeo = new THREE.PlaneGeometry(20, 20);
  var shadowMat = new THREE.ShadowMaterial({ opacity: 0.25 });
  var shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = 0;
  shadowPlane.receiveShadow = true;
  scene.add(shadowPlane);

  await startCamera();

  window.addEventListener('resize', onResize);
  document.getElementById('tap-plane').addEventListener('click', onTap);
  document.getElementById('tap-plane').addEventListener('touchstart', onTouchStart, { passive: false });
  document.getElementById('tap-plane').addEventListener('touchmove', onTouchMove, { passive: false });
  document.getElementById('tap-plane').addEventListener('touchend', onTouchEnd, { passive: false });
  document.getElementById('glb-file-input').addEventListener('change', onFileSelected);
  setupDragDrop();

  animate();

  renderLightboxCards();
  initCardPreviews();
  animatePreviews();

  initPositionSliders();
  initTiltJoystick();
  initRotationDial();
  initScaleSlider();
  initZSlider();
  initStyleStudio();

  document.getElementById('loading-screen').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════
async function startCamera() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    var video = document.getElementById('camera-feed');
    video.srcObject = stream;
    await video.play();
  } catch (err) {
    showError(err.name === 'NotAllowedError'
      ? 'Camera access denied. Tap Retry and allow camera permissions.'
      : 'Could not access camera: ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-screen').style.display = 'flex';
}

// ═══════════════════════════════════════════════════
// TAP TO PLACE
// ═══════════════════════════════════════════════════
function getPlacePosition(clientX, clientY) {
  var ndcX = (clientX / window.innerWidth) * 2 - 1;
  var ndcY = -(clientY / window.innerHeight) * 2 + 1;
  var raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
  var groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  var target = new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane, target);
  var dist = target.distanceTo(camera.position);
  if (dist < 0.5 || dist > 8) {
    var dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    target.copy(camera.position).addScaledVector(dir, 2.5);
    target.y = 0;
  }
  return target;
}

function onTap(e) {
  if (e.target.closest('button')) return;
  var pos = getPlacePosition(e.clientX, e.clientY);
  placeAt(pos);
}

function placeAt(pos) {
  if (customGLBBlob) {
    spawnGLBModel(customGLBBlob, pos);
  } else if (selectedModel) {
    if (modelGroup) { scene.remove(modelGroup); modelGroup = null; }
    modelGroup = buildLickalotapus(selectedModel.colors, null);
    modelGroup.position.copy(pos);
    scene.add(modelGroup);
  } else {
    return;
  }
  placed = true;
  document.getElementById('crosshair').classList.add('placed');
  document.getElementById('control-cluster').classList.add('show');
  var bc = document.getElementById('btn-clear'); if (bc) bc.style.display = '';
  document.getElementById('btn-shoot').style.display = '';
  setHint('');
  updateScaleSliderFromModel();
  var badge = document.getElementById('placed-badge');
  badge.classList.add('show');
  setTimeout(function() { badge.classList.remove('show'); }, 1200);
}

// ═══════════════════════════════════════════════════
// TAP-PLANE TOUCH (pinch-to-scale only)
// ═══════════════════════════════════════════════════
function onTouchStart(e) {
  e.preventDefault();
  if (!placed || !modelGroup) return;
  if (e.touches.length === 2) {
    pinchDist0 = getPinchDist(e);
    modelScale0 = modelGroup.scale.x;
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (!placed || !modelGroup) return;
  if (e.touches.length === 2 && pinchDist0) {
    var dist = getPinchDist(e);
    var ratio = dist / pinchDist0;
    var s = Math.max(0.1, Math.min(5, modelScale0 * ratio));
    modelGroup.scale.setScalar(s);
    updateScaleSliderFromModel();
  }
}
function onTouchEnd(e) {
  if (e.touches.length === 0) pinchDist0 = null;
}
function getPinchDist(e) {
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// ═══════════════════════════════════════════════════
// POSITION SLIDERS (X horizontal, Y vertical in L-shape)
// ═══════════════════════════════════════════════════
var posXActive = false, posYActive = false;
var POS_RANGE = 4.0;
var POS_Y_MIN = -2.0, POS_Y_MAX = 4.0;

function initPositionSliders() {
  var xSlider = document.getElementById('pos-x-slider');
  var xThumb = document.getElementById('pos-x-thumb');
  var ySlider = document.getElementById('pos-y-slider');
  var yThumb = document.getElementById('pos-y-thumb');

  function applyX(clientX) {
    if (!modelGroup) return;
    var r = xSlider.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    modelGroup.position.x = -POS_RANGE + pct * (POS_RANGE * 2);
    xThumb.style.left = (pct * 100) + '%';
  }
  function applyY(clientY) {
    if (!modelGroup) return;
    var r = ySlider.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientY - r.top) / r.height));
    // Top = high Y, bottom = low Y
    modelGroup.position.y = POS_Y_MAX - pct * (POS_Y_MAX - POS_Y_MIN);
    yThumb.style.top = (pct * 100) + '%';
  }

  xSlider.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); posXActive = true; xThumb.classList.add('dragging'); applyX(e.touches[0].clientX); }, { passive: false });
  xSlider.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); posXActive = true; xThumb.classList.add('dragging'); applyX(e.clientX); });
  ySlider.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); posYActive = true; yThumb.classList.add('dragging'); applyY(e.touches[0].clientY); }, { passive: false });
  ySlider.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); posYActive = true; yThumb.classList.add('dragging'); applyY(e.clientY); });

  window.addEventListener('touchmove', function(e) {
    if (posXActive) { e.preventDefault(); applyX(e.touches[0].clientX); }
    if (posYActive) { e.preventDefault(); applyY(e.touches[0].clientY); }
  }, { passive: false });
  window.addEventListener('mousemove', function(e) {
    if (posXActive) applyX(e.clientX);
    if (posYActive) applyY(e.clientY);
  });
  window.addEventListener('touchend', function() {
    if (posXActive) { posXActive = false; xThumb.classList.remove('dragging'); }
    if (posYActive) { posYActive = false; yThumb.classList.remove('dragging'); }
  });
  window.addEventListener('mouseup', function() {
    if (posXActive) { posXActive = false; xThumb.classList.remove('dragging'); }
    if (posYActive) { posYActive = false; yThumb.classList.remove('dragging'); }
  });
}

function updatePositionSlidersFromModel() {
  if (!modelGroup) return;
  var xPct = (modelGroup.position.x + POS_RANGE) / (POS_RANGE * 2);
  var yPct = (POS_Y_MAX - modelGroup.position.y) / (POS_Y_MAX - POS_Y_MIN);
  var xT = document.getElementById('pos-x-thumb');
  var yT = document.getElementById('pos-y-thumb');
  if (xT) xT.style.left = Math.max(0, Math.min(100, xPct * 100)) + '%';
  if (yT) yT.style.top = Math.max(0, Math.min(100, yPct * 100)) + '%';
}

// ═══════════════════════════════════════════════════
// ROTATION DIAL
// ═══════════════════════════════════════════════════
var dialActive = false, dialStartAngle = 0, dialModelStartY = 0;

function initRotationDial() {
  var dial = document.getElementById('rotation-dial');
  var marker = document.getElementById('dial-marker');
  var degrees = document.getElementById('dial-degrees');

  function getAngle(cx, cy) {
    var r = dial.getBoundingClientRect();
    return Math.atan2(cy - (r.top + r.height / 2), cx - (r.left + r.width / 2));
  }
  function start(cx, cy) {
    dialActive = true;
    dialStartAngle = getAngle(cx, cy);
    dialModelStartY = modelGroup ? modelGroup.rotation.y : 0;
  }
  function move(cx, cy) {
    if (!dialActive || !modelGroup) return;
    var delta = getAngle(cx, cy) - dialStartAngle;
    modelGroup.rotation.y = dialModelStartY + delta;
    var displayAngle = ((modelGroup.rotation.y % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    var deg = Math.round(displayAngle * 180 / Math.PI);
    marker.style.transform = 'translateX(-50%) rotate(' + displayAngle + 'rad)';
    marker.style.transformOrigin = '50% ' + (dial.offsetHeight / 2 - 2) + 'px';
    degrees.textContent = deg + '\u00B0';
  }
  function end() { dialActive = false; }

  dial.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); start(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  dial.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); start(e.clientX, e.clientY); });
  window.addEventListener('touchmove', function(e) { if (dialActive) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (dialActive) move(e.clientX, e.clientY); });
  window.addEventListener('touchend', function() { if (dialActive) end(); });
  window.addEventListener('mouseup', function() { if (dialActive) end(); });
}

// ═══════════════════════════════════════════════════
// SCALE SLIDER
// ═══════════════════════════════════════════════════
var scaleSliderActive = false;

function initScaleSlider() {
  var container = document.getElementById('scale-slider-container');
  var thumb = document.getElementById('scale-thumb');
  var label = document.getElementById('scale-label');
  var MIN_S = 0.1, MAX_S = 5.0;

  function apply(clientY) {
    if (!modelGroup) return;
    var r = container.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientY - r.top) / r.height));
    var s = MAX_S - pct * (MAX_S - MIN_S);
    modelGroup.scale.setScalar(s);
    thumb.style.top = (pct * 100) + '%';
    label.textContent = Math.round(s * 100) + '%';
  }
  container.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); scaleSliderActive = true; thumb.classList.add('dragging'); apply(e.touches[0].clientY); }, { passive: false });
  container.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); scaleSliderActive = true; thumb.classList.add('dragging'); apply(e.clientY); });
  window.addEventListener('touchmove', function(e) { if (scaleSliderActive) { e.preventDefault(); apply(e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (scaleSliderActive) apply(e.clientY); });
  window.addEventListener('touchend', function() { if (scaleSliderActive) { scaleSliderActive = false; thumb.classList.remove('dragging'); } });
  window.addEventListener('mouseup', function() { if (scaleSliderActive) { scaleSliderActive = false; thumb.classList.remove('dragging'); } });
}

function updateScaleSliderFromModel() {
  if (!modelGroup) return;
  var s = modelGroup.scale.x;
  var pct = (5.0 - s) / (5.0 - 0.1);
  var thumb = document.getElementById('scale-thumb');
  var label = document.getElementById('scale-label');
  if (thumb) thumb.style.top = Math.max(0, Math.min(100, pct * 100)) + '%';
  if (label) label.textContent = Math.round(s * 100) + '%';
}

// ═══════════════════════════════════════════════════
// TILT JOYSTICK
// ═══════════════════════════════════════════════════
var tiltActive = false, tiltDx = 0, tiltDy = 0, tiltAnimFrame = null;
var TILT_RADIUS = 20, TILT_SPEED = 0.003;

function initTiltJoystick() {
  var container = document.getElementById('tilt-container');
  var knob = document.getElementById('tilt-knob');
  var center = { x: 0, y: 0 };

  function start(cx, cy) {
    var r = container.getBoundingClientRect();
    center = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    tiltActive = true;
    knob.classList.add('dragging');
    move(cx, cy);
    if (!tiltAnimFrame) loop();
  }
  function move(cx, cy) {
    var dx = cx - center.x, dy = cy - center.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > TILT_RADIUS) { dx = dx / dist * TILT_RADIUS; dy = dy / dist * TILT_RADIUS; }
    tiltDx = dx / TILT_RADIUS;
    tiltDy = dy / TILT_RADIUS;
    knob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
  }
  function end() {
    tiltActive = false; tiltDx = 0; tiltDy = 0;
    knob.classList.remove('dragging');
    knob.style.transform = 'translate(-50%, -50%)';
    if (tiltAnimFrame) { cancelAnimationFrame(tiltAnimFrame); tiltAnimFrame = null; }
  }
  function loop() {
    if (!tiltActive) { tiltAnimFrame = null; return; }
    if (modelGroup && (Math.abs(tiltDx) > 0.05 || Math.abs(tiltDy) > 0.05)) {
      // tiltDy = forward/back tilt (X rotation), tiltDx = side tilt (Z rotation)
      modelGroup.rotation.x += tiltDy * TILT_SPEED;
      modelGroup.rotation.z -= tiltDx * TILT_SPEED;
      // Clamp to reasonable range
      modelGroup.rotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, modelGroup.rotation.x));
      modelGroup.rotation.z = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, modelGroup.rotation.z));
    }
    tiltAnimFrame = requestAnimationFrame(loop);
  }
  container.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); start(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  container.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); start(e.clientX, e.clientY); });
  window.addEventListener('touchmove', function(e) { if (tiltActive) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (tiltActive) move(e.clientX, e.clientY); });
  window.addEventListener('touchend', function(e) { if (tiltActive && e.touches.length === 0) end(); });
  window.addEventListener('mouseup', function() { if (tiltActive) end(); });
}

// ═══════════════════════════════════════════════════
// Z (DEPTH) SLIDER
// ═══════════════════════════════════════════════════
var zSliderActive = false;

function initZSlider() {
  var container = document.getElementById('z-slider-container');
  var thumb = document.getElementById('z-thumb');
  var label = document.getElementById('z-label');
  var isPortrait = window.innerHeight > window.innerWidth;
  var MIN_Z = -10.0, MAX_Z = isPortrait ? -5.0 : -2.0;
  window.addEventListener('resize', function() {
    isPortrait = window.innerHeight > window.innerWidth;
    MAX_Z = isPortrait ? -5.0 : -2.0;
  });

  function apply(clientX) {
    if (!modelGroup) return;
    var r = container.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    // Left = far (MIN_Z), right = near (MAX_Z)
    var z = MIN_Z + pct * (MAX_Z - MIN_Z);
    modelGroup.position.z = z;
    thumb.style.left = (pct * 100) + '%';
    label.textContent = 'Z:' + z.toFixed(1);
  }
  container.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); zSliderActive = true; thumb.classList.add('dragging'); apply(e.touches[0].clientX); }, { passive: false });
  container.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); zSliderActive = true; thumb.classList.add('dragging'); apply(e.clientX); });
  window.addEventListener('touchmove', function(e) { if (zSliderActive) { e.preventDefault(); apply(e.touches[0].clientX); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (zSliderActive) apply(e.clientX); });
  window.addEventListener('touchend', function() { if (zSliderActive) { zSliderActive = false; thumb.classList.remove('dragging'); } });
  window.addEventListener('mouseup', function() { if (zSliderActive) { zSliderActive = false; thumb.classList.remove('dragging'); } });
}

// Scroll wheel also scales
window.addEventListener('wheel', function(e) {
  if (!placed || !modelGroup) return;
  e.preventDefault();
  var delta = e.deltaY * -0.001;
  var s = Math.max(0.1, Math.min(5, modelGroup.scale.x + delta));
  modelGroup.scale.setScalar(s);
  updateScaleSliderFromModel();
}, { passive: false });

// ═══════════════════════════════════════════════════
// IDLE ANIMATION
// ═══════════════════════════════════════════════════
function animateModel(t) {
  if (!modelGroup) return;
  // Tongue wiggle only — don't override position.y or rotation.z (controlled by widgets)
  modelGroup.children.forEach(function(child) {
    if (child.userData.isTongue) child.rotation.z = Math.sin(t * 3) * 0.15;
  });
}

// ═══════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();
  animateModel(t);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════
// SCREENSHOT
// ═══════════════════════════════════════════════════
function takeScreenshot() {
  var flash = document.getElementById('flash');
  flash.style.opacity = '0.9';
  setTimeout(function() { flash.style.opacity = '0'; }, 120);

  // Hide UI elements
  var hideEls = ['controls', 'crosshair', 'placed-badge', 'style-toggle', 'style-panel', 'shortcut-legend', 'control-cluster'];
  hideEls.forEach(function(id) { var el = document.getElementById(id); if (el) el.style.visibility = 'hidden'; });

  var video = document.getElementById('camera-feed');
  var arCanvas = document.getElementById('ar-canvas');

  var out = document.createElement('canvas');
  out.width = arCanvas.width;
  out.height = arCanvas.height;
  var ctx = out.getContext('2d');

  // Draw video (crop to match aspect)
  var vidW = video.videoWidth, vidH = video.videoHeight;
  var outAspect = out.width / out.height, vidAspect = vidW / vidH;
  var sx, sy, sw, sh;
  if (vidAspect > outAspect) { sh = vidH; sw = Math.round(vidH * outAspect); sx = Math.round((vidW - sw) / 2); sy = 0; }
  else { sw = vidW; sh = Math.round(vidW / outAspect); sx = 0; sy = Math.round((vidH - sh) / 2); }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, out.width, out.height);

  // Draw 3D overlay
  renderer.render(scene, camera);
  ctx.drawImage(arCanvas, 0, 0);

  // Themed watermark — match live HUD text sizes
  var wt = window.getWmTheme();
  var ss = window.getSubStyle();
  var ssWeight = (ss.weight === 'bold') ? 'bold ' : '';
  var ssItalic = ss.italic ? 'italic ' : '';

  // Read live sizes from DOM, scale by canvas/viewport ratio
  var titleEl = document.querySelector('#header .title');
  var subEl = document.querySelector('#header .sub');
  var scale = out.width / (arCanvas.clientWidth || out.width);
  var titleSize = Math.round((titleEl ? parseInt(getComputedStyle(titleEl).fontSize) : 22) * scale);
  var subSize = Math.round((subEl ? parseInt(getComputedStyle(subEl).fontSize) : 14) * scale);
  var headerPad = Math.round(8 * scale);

  // Top header gradient
  var headerH = headerPad + titleSize + subSize + 20;
  var hGrad = ctx.createLinearGradient(0, 0, 0, headerH);
  hGrad.addColorStop(0, wt.barBg); hGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, 0, out.width, headerH);

  ctx.textBaseline = 'top'; ctx.textAlign = 'center';
  ctx.shadowColor = wt.titleGlow; ctx.shadowBlur = 10;
  ctx.font = 'bold ' + titleSize + 'px Courier New';
  ctx.fillStyle = wt.titleColor;
  ctx.fillText('\u{1F445} LICKALOTAPUS', out.width / 2, headerPad);
  ctx.font = ssItalic + ssWeight + subSize + 'px ' + ss.fontLabel;
  ctx.fillStyle = ss.color; ctx.shadowColor = ss.color; ctx.shadowBlur = 6;
  ctx.fillText('In The Wild', out.width / 2, headerPad + titleSize * 1.3);
  ctx.shadowBlur = 0;

  // Bottom gradient with hashtag
  var hashSize = Math.round(subSize * 0.9);
  var bottomH = hashSize + Math.round(30 * scale);
  var bGrad = ctx.createLinearGradient(0, out.height, 0, out.height - bottomH);
  bGrad.addColorStop(0, wt.barBg); bGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bGrad;
  ctx.fillRect(0, out.height - bottomH, out.width, bottomH);

  ctx.textBaseline = 'bottom'; ctx.textAlign = 'center';
  ctx.font = 'bold ' + hashSize + 'px Courier New';
  ctx.fillStyle = wt.hashColor; ctx.shadowColor = wt.hashGlow; ctx.shadowBlur = 6;
  ctx.fillText('#LickalotapusInTheWild', out.width / 2, out.height - Math.round(10 * scale));
  ctx.shadowBlur = 0;

  // Restore UI
  hideEls.forEach(function(id) { var el = document.getElementById(id); if (el) el.style.visibility = ''; });

  var link = document.createElement('a');
  link.download = 'lickalotapus-in-the-wild.png';
  link.href = out.toDataURL('image/png');
  link.click();

  setHint('SAVED! POST WITH #LickalotapusInTheWild');
  setTimeout(function() { setHint(placed ? '' : 'TAP ANYWHERE TO PLACE LICKALOTAPUS'); }, 8000);
}

// ═══════════════════════════════════════════════════
// FILE LOADING & DRAG DROP
// ═══════════════════════════════════════════════════
function onFileSelected(e) {
  var file = e.target.files[0];
  if (!file) return;
  loadFile(file);
  e.target.value = '';
}

function loadFile(file) {
  if (!file.name.match(/\.(glb|gltf)$/i)) {
    setHint('Please select a .glb or .gltf file');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(ev) {
    customGLBBlob = new Blob([ev.target.result], { type: 'model/gltf-binary' });
    selectedModel = null;
    document.getElementById('model-label').innerHTML = 'CUSTOM GLB';
    closeLightbox();
    var dir = new THREE.Vector3();
    camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
    var pos = camera.position.clone().addScaledVector(dir, 3);
    pos.y = 0;
    placeAt(pos);
    closeLightbox();
  };
  reader.readAsArrayBuffer(file);
}

function setupDragDrop() {
  document.addEventListener('dragover', function(e) { e.preventDefault(); });
  document.addEventListener('drop', function(e) {
    e.preventDefault();
    var file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
}

// ═══════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════
function getViewportRect() {
  var winW = window.innerWidth, winH = window.innerHeight;
  if (currentAspect === 'free') return { x: 0, y: 0, w: winW, h: winH };
  var target = ASPECT_RATIOS[currentAspect];
  var winRatio = winW / winH;
  var w, h;
  if (winRatio > target) { h = winH; w = Math.round(winH * target); }
  else { w = winW; h = Math.round(winW / target); }
  return { x: Math.round((winW - w) / 2), y: Math.round((winH - h) / 2), w: w, h: h };
}

function onResize() {
  var r = getViewportRect();
  // Apply letterbox to viewport elements
  ['camera-feed', 'ar-canvas', 'tap-plane', 'ui'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.left = r.x + 'px';
    el.style.top = r.y + 'px';
    el.style.width = r.w + 'px';
    el.style.height = r.h + 'px';
    if (currentAspect !== 'free') {
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    } else {
      el.style.left = ''; el.style.top = '';
      el.style.width = ''; el.style.height = '';
      el.style.right = ''; el.style.bottom = '';
    }
  });
  camera.aspect = r.w / r.h;
  camera.updateProjectionMatrix();
  renderer.setSize(r.w, r.h);
}

var undoState = null, undoTimer = null;

window.undoClear = function() {

  var bar = document.getElementById('undo-bar');
  bar.classList.remove('show');
  clearTimeout(undoTimer);
  modelGroup = undoState.group;
  modelGroup.position.copy(undoState.position);
  modelGroup.rotation.copy(undoState.rotation);
  modelGroup.scale.copy(undoState.scale);
  scene.add(modelGroup);
  placed = true;
  document.getElementById('crosshair').classList.add('placed');
  document.getElementById('control-cluster').classList.add('show');
  var bc = document.getElementById('btn-clear'); if (bc) bc.style.display = '';
  document.getElementById('btn-shoot').style.display = '';
  setHint('RESTORED');
  updateScaleSliderFromModel();
  updatePositionSlidersFromModel();
  undoState = null;
};

function initStyleStudio() {

function updateThemePreview() {
  var t = currentWmTheme;

function applyThemeToHUD() {

function applySubStyle() {
