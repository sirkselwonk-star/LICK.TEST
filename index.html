<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════
// MODEL VARIANT DATA
// ═══════════════════════════════════════════════════
// Base OG colors — all variants use these for the body
var OG_BODY = { body: 0x6b4228, bodyShadow: 0x3d2810, belly: 0xc8a07a, snout: 0x2a2a3a, earInner: 0xc86478 };

const MODELS = [
  {
    id: 'og',
    name: 'OG Lick',
    tag: 'CLASSIC',
    desc: 'The original brown beaver. Big eyes, long tongue, zero shame.',
    traits: ['CLASSIC', 'PINK TONGUE', 'OG'],
    colors: Object.assign({}, OG_BODY, { tongue: 0xe8607a, tongueTip: 0xff9aaa, tail: 0x1a1a2a, tailFace: 0x252535, stripes: null })
  },
  {
    id: 'prison',
    name: 'Prison Lick',
    tag: 'PRISON',
    desc: 'Fresh out of solitary. Striped jumpsuit. Still smuggling contraband.',
    traits: ['STRIPES', 'PRISON', 'CONTRABAND'],
    colors: Object.assign({}, OG_BODY, { tongue: 0xe8607a, tongueTip: 0xff9aaa, tail: 0x1a1a2a, tailFace: 0x252535, stripes: 0xf0f0f0 })
  },
  {
    id: 'slime',
    name: 'Slime Lick',
    tag: 'SLIME',
    desc: 'Dripping with toxic ooze. The tongue glows green. Absolutely unhinged.',
    traits: ['TOXIC TONGUE', 'OOZE TAIL', 'SLIME'],
    colors: Object.assign({}, OG_BODY, { tongue: 0x66e633, tongueTip: 0x99ff66, tail: 0x1e591e, tailFace: 0x2e732e, stripes: null })
  },
  {
    id: 'gold',
    name: 'Gold Lick',
    tag: 'LEGENDARY',
    desc: 'Gilded crown and golden tail. The rarest Lickalotapus. Flex it.',
    traits: ['CROWN', 'GOLD TAIL', 'LEGENDARY'],
    colors: Object.assign({}, OG_BODY, { tongue: 0xe8607a, tongueTip: 0xff9aaa, tail: 0xb8941a, tailFace: 0xd9b31a, stripes: null, crown: true })
  },
  {
    id: 'neon',
    name: 'Neon Lick',
    tag: 'NEON',
    desc: 'Cyberpunk fever dream. Hot pink tongue, neon tail. Probably radioactive.',
    traits: ['HOT PINK TONGUE', 'NEON TAIL', 'CYBERPUNK'],
    colors: Object.assign({}, OG_BODY, { tongue: 0xff00ff, tongueTip: 0xff80ff, tail: 0x004d80, tailFace: 0x00b3e6, stripes: null })
  }
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let scene, camera, renderer, clock;
let modelGroup = null;
let selectedModel = null;
let placed = false;
let transformMode = 'move';
let lastTouch = null;
let pinchDist0 = null;
let modelScale0 = 1;
let modelRotY0 = 0;
let previewScenes = [];

// ═══════════════════════════════════════════════════
// BUILD LICKALOTAPUS PLACEHOLDER (per variant)
// ═══════════════════════════════════════════════════
function buildLickalotapus(c, targetScene) {
  var group = new THREE.Group();
  function mat(color) { return new THREE.MeshLambertMaterial({ color: color }); }
  function box(name, sx, sy, sz, px, py, pz, m) {
    var mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), m || bodyM);
    mesh.position.set(px, py, pz); mesh.castShadow = true;
    group.add(mesh); return mesh;
  }
  function sphere(name, r, px, py, pz, m) {
    var mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 5), m || bodyM);
    mesh.position.set(px, py, pz);
    group.add(mesh); return mesh;
  }

  // Procedural texture generators
  function makeFurTexture(baseColor) {
    var cv = document.createElement('canvas');
    cv.width = 64; cv.height = 64;
    var cx = cv.getContext('2d');
    var r = (baseColor >> 16) & 0xff;
    var g = (baseColor >> 8) & 0xff;
    var b = baseColor & 0xff;
    // Base fill
    cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    cx.fillRect(0, 0, 64, 64);
    // Dark undercoat variation
    for (var u = 0; u < 40; u++) {
      var ux = Math.random() * 64;
      var uy = Math.random() * 64;
      cx.fillStyle = 'rgba(0,0,0,0.12)';
      cx.fillRect(ux, uy, 2 + Math.random() * 4, 1);
    }
    // Fur strokes — short directional lines with strong color variation
    for (var i = 0; i < 200; i++) {
      var sx = Math.random() * 64;
      var sy = Math.random() * 64;
      var len = 4 + Math.random() * 8;
      var angle = -0.5 + Math.random() * 1.0; // mostly vertical
      var vary = Math.floor(Math.random() * 60 - 30);
      var sr = Math.max(0, Math.min(255, r + vary));
      var sg = Math.max(0, Math.min(255, g + vary));
      var sb = Math.max(0, Math.min(255, b + vary));
      cx.strokeStyle = 'rgba(' + sr + ',' + sg + ',' + sb + ',0.85)';
      cx.lineWidth = 1.0 + Math.random() * 1.2;
      cx.beginPath();
      cx.moveTo(sx, sy);
      cx.lineTo(sx + Math.sin(angle) * len, sy + Math.cos(angle) * len);
      cx.stroke();
    }
    // Highlights for sheen
    for (var j = 0; j < 30; j++) {
      var hx = Math.random() * 64;
      var hy = Math.random() * 64;
      cx.fillStyle = 'rgba(255,255,255,0.14)';
      cx.fillRect(hx, hy, 1, 3 + Math.random() * 4);
    }
    var tex = new THREE.CanvasTexture(cv);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return new THREE.MeshLambertMaterial({ map: tex });
  }

  function makeBellyTexture(baseColor) {
    var cv = document.createElement('canvas');
    cv.width = 64; cv.height = 64;
    var cx = cv.getContext('2d');
    var r = (baseColor >> 16) & 0xff;
    var g = (baseColor >> 8) & 0xff;
    var b = baseColor & 0xff;
    cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    cx.fillRect(0, 0, 64, 64);
    // Soft fine grain — tiny lighter and darker speckles
    for (var i = 0; i < 80; i++) {
      var sx = Math.random() * 64;
      var sy = Math.random() * 64;
      var rad = 0.8 + Math.random() * 1.2;
      var light = Math.random() > 0.5;
      cx.beginPath();
      cx.arc(sx, sy, rad, 0, Math.PI * 2);
      cx.fillStyle = light
        ? 'rgba(255,255,255,0.08)'
        : 'rgba(0,0,0,0.05)';
      cx.fill();
    }
    // Subtle horizontal softness lines
    for (var j = 0; j < 8; j++) {
      var ly = 4 + Math.random() * 56;
      cx.strokeStyle = 'rgba(255,255,255,0.05)';
      cx.lineWidth = 0.5 + Math.random() * 0.5;
      cx.beginPath();
      cx.moveTo(0, ly);
      cx.lineTo(64, ly + (Math.random() - 0.5) * 3);
      cx.stroke();
    }
    var tex = new THREE.CanvasTexture(cv);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return new THREE.MeshLambertMaterial({ map: tex });
  }

  function makeSnoutTexture(baseColor) {
    var cv = document.createElement('canvas');
    cv.width = 48; cv.height = 48;
    var cx = cv.getContext('2d');
    var r = (baseColor >> 16) & 0xff;
    var g = (baseColor >> 8) & 0xff;
    var b = baseColor & 0xff;
    cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    cx.fillRect(0, 0, 48, 48);
    // Leathery bumps — small raised-looking dots
    for (var i = 0; i < 60; i++) {
      var sx = Math.random() * 48;
      var sy = Math.random() * 48;
      var rad = 0.8 + Math.random() * 1.5;
      // Highlight on top of bump, shadow on bottom
      cx.beginPath();
      cx.arc(sx, sy - 0.3, rad, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,0.10)';
      cx.fill();
      cx.beginPath();
      cx.arc(sx, sy + 0.3, rad, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(0,0,0,0.12)';
      cx.fill();
    }
    var tex = new THREE.CanvasTexture(cv);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return new THREE.MeshLambertMaterial({ map: tex });
  }

  var bodyM = makeFurTexture(c.body);
  var shadowM = makeFurTexture(c.bodyShadow);
  var bellyM = makeBellyTexture(c.belly);
  var tongM = mat(c.tongue);
  var tipM = mat(c.tongueTip);
  var tailM = mat(c.tail);
  var tailFaceM = mat(c.tailFace);
  var snoutM = makeSnoutTexture(c.snout);
  var earM = mat(c.earInner);
  var eyeM = mat(0xf0f0f0);
  var pupilM = mat(0x1a1a1a);
  var highlightM = mat(0xffffff);
  var mouthM = mat(0xc0203a);
  var teethM = mat(0xf0ead8);
  var pawM = makeSnoutTexture(0x2a2a38);
  var noseM = mat(0x1a1a28);
  var whiskerM = mat(0xe0e0e0);

  // Body
  box("Body", 0.38, 0.42, 0.30, 0, 0.30, 0.08);
  box("Belly", 0.26, 0.32, 0.06, 0, 0.30, 0.22, bellyM);
  box("BodyShadow", 0.38, 0.42, 0.02, 0, 0.30, -0.07, shadowM);

  // Neck (connects body to head)
  var neckMesh = box("Neck", 0.24, 0.14, 0.22, 0, 0.56, 0.10);
  neckMesh.userData.isHead = true; neckMesh.userData.baseY = 0.56;
  // Head
  var headMesh = box("Head", 0.36, 0.32, 0.28, 0, 0.68, 0.10, bodyM);
  headMesh.userData.isHead = true; headMesh.userData.baseY = 0.68;

  // Ears
  [-0.10, 0.10].forEach(function(x) {
    var e1 = box("Ear", 0.08, 0.08, 0.06, x, 0.86, 0.10, bodyM);
    e1.userData.isHead = true; e1.userData.baseY = 0.86;
    e1.userData.isEar = true; e1.userData.earSide = x < 0 ? -1 : 1;
    var e2 = box("EarIn", 0.04, 0.04, 0.03, x, 0.86, 0.12, earM);
    e2.userData.isHead = true; e2.userData.baseY = 0.86;
    e2.userData.isEar = true; e2.userData.earSide = x < 0 ? -1 : 1;
  });

  // Eyes (spheres) + eyelids for blink/wink
  var eyelidMat = makeFurTexture(c.body);
  [-0.08, 0.08].forEach(function(x, i) {
    var ey = sphere("Eye", 0.055, x, 0.74, 0.22, eyeM);
    ey.userData.isHead = true; ey.userData.baseY = 0.74;
    var pu = sphere("Pupil", 0.03, x, 0.74, 0.26, pupilM);
    pu.userData.isHead = true; pu.userData.baseY = 0.74;
    var hl = sphere("Highlight", 0.012, x - 0.015, 0.76, 0.27, highlightM);
    hl.userData.isHead = true; hl.userData.baseY = 0.76;
    // Eyelid — top of eye, drops down to cover it
    // Pivot is at the top edge; mesh extends downward
    var lidGroup = new THREE.Group();
    lidGroup.position.set(x, 0.795, 0.27); // top of eye
    var lidMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.11, 0.06), eyelidMat);
    lidMesh.position.y = -0.055; // hang down from pivot
    lidGroup.add(lidMesh);
    lidGroup.scale.y = 0; // start open (invisible)
    lidGroup.userData.isHead = true; lidGroup.userData.baseY = 0.795;
    lidGroup.userData.isEyelid = true;
    lidGroup.userData.eyeSide = i === 0 ? 'L' : 'R';
    group.add(lidGroup);
  });

  // Snout
  var snoutMesh = box("Snout", 0.14, 0.10, 0.12, 0, 0.64, 0.24, snoutM);
  snoutMesh.userData.isFace = true; snoutMesh.userData.baseY = 0.64;
  [-0.025, 0.025].forEach(function(x) {
    var n = sphere("Nostril", 0.012, x, 0.67, 0.30, noseM);
    n.userData.isFace = true; n.userData.baseY = 0.67;
  });

  // Mouth + teeth
  var mouthMesh = box("Mouth", 0.12, 0.04, 0.08, 0, 0.58, 0.24, mouthM);
  mouthMesh.userData.isFace = true; mouthMesh.userData.baseY = 0.58;
  var tL = box("ToothL", 0.03, 0.04, 0.02, -0.02, 0.57, 0.28, teethM);
  tL.userData.isFace = true; tL.userData.baseY = 0.57;
  var tR = box("ToothR", 0.03, 0.04, 0.02, 0.02, 0.57, 0.28, teethM);
  tR.userData.isFace = true; tR.userData.baseY = 0.57;

  // Tongue — chain of segments, each parented to the previous
  var tongueGroup = new THREE.Group();
  tongueGroup.userData.isTongue = true;
  tongueGroup.position.set(0, 0.66, 0.20);

  var TONGUE_SEGS = 16;
  var segLen = 0.045;
  var prevNode = tongueGroup;

  // Generate tongue texture with center groove and papillae bumps
  function makeTongueTexture(baseColor, frac) {
    var cv = document.createElement('canvas');
    cv.width = 64; cv.height = 32;
    var cx = cv.getContext('2d');
    // Parse base color
    var r = (baseColor >> 16) & 0xff;
    var g = (baseColor >> 8) & 0xff;
    var b = baseColor & 0xff;
    // Fill base
    cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    cx.fillRect(0, 0, 64, 32);
    // Papillae bumps — small lighter dots on each half
    var bumpCount = Math.max(6, Math.floor(20 * (1 - frac * 0.5)));
    for (var i = 0; i < bumpCount; i++) {
      var side = i % 2 === 0 ? -1 : 1;
      var bx = 32 + side * (6 + Math.random() * 22);
      var by = 4 + Math.random() * 24;
      var br = 1.5 + Math.random() * 2;
      var light = 18 + Math.floor(Math.random() * 14);
      cx.beginPath();
      cx.arc(bx, by, br, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(' + Math.min(255, r + light) + ',' + Math.min(255, g + light) + ',' + Math.min(255, b + light) + ',0.5)';
      cx.fill();
    }
    // Center groove — darker line down the middle
    var grooveW = 1.5 + (1 - frac) * 1.0;
    cx.fillStyle = 'rgba(0,0,0,0.15)';
    cx.fillRect(32 - grooveW / 2, 0, grooveW, 32);
    // Subtle darker edge along groove for depth
    cx.fillStyle = 'rgba(0,0,0,0.08)';
    cx.fillRect(32 - grooveW / 2 - 1, 0, 1, 32);
    cx.fillRect(32 + grooveW / 2, 0, 1, 32);
    // Slight shading: left half slightly lighter, right half slightly darker
    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.fillRect(0, 0, 31, 32);
    cx.fillStyle = 'rgba(0,0,0,0.04)';
    cx.fillRect(33, 0, 31, 32);
    var tex = new THREE.CanvasTexture(cv);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  for (var ti = 0; ti < TONGUE_SEGS; ti++) {
    var frac = ti / (TONGUE_SEGS - 1);
    var node = new THREE.Group();
    node.position.set(0, -segLen, 0);
    // Base tilt: mostly flat — let the animation handle the movement
    // First segments point forward, rest are nearly neutral
    var tilt;
    if (ti < 3) tilt = -0.35;          // forward out of mouth
    else tilt = 0.02;                   // nearly flat — animation drives the flex
    node.rotation.x = tilt;
    node.userData.tongueIdx = ti;
    node.userData.baseTilt = tilt;

    // Width tapers, gets thinner toward tip
    var segW = 0.10 * (1.0 - frac * 0.45);
    var segThick = 0.04 * (1.0 - frac * 0.3);
    var baseCol = frac < 0.7 ? c.tongue : c.tongueTip;
    var tongTex = makeTongueTexture(baseCol, frac);
    var segMat = new THREE.MeshLambertMaterial({ map: tongTex });
    var seg = new THREE.Mesh(new THREE.BoxGeometry(segW, segLen * 0.95, segThick), segMat);
    seg.position.y = -segLen / 2;
    node.add(seg);

    prevNode.add(node);
    prevNode = node;
  }

  // Helper: find chain node by walking through children that have tongueIdx
  function findChainNode(startNode, targetIdx) {
    // Tongue chain: each Group has mesh as child[0], next Group as child[1]
    var node = startNode;
    for (var i = 0; i <= targetIdx; i++) {
      // Find the child that's a Group with tongueIdx
      var found = null;
      for (var c = 0; c < node.children.length; c++) {
        if (node.children[c].userData && node.children[c].userData.tongueIdx !== undefined) {
          found = node.children[c];
          break;
        }
      }
      if (!found) break;
      node = found;
    }
    return node;
  }

  // Saliva system — drips on bottom-underside of tongue segments
  var dripM = new THREE.MeshLambertMaterial({ color: 0xc0dff0, transparent: true, opacity: 0.6 });
  var heavyDripM = new THREE.MeshLambertMaterial({ color: 0xd0e8f8, transparent: true, opacity: 0.75 });

  function segThickness(segIdx) {
    var f = segIdx / (TONGUE_SEGS - 1);
    return 0.04 * (1.0 - f * 0.3);
  }

  // Drip blob on underside of a segment
  function addDrip(segIdx, dx, r, mat) {
    var node = findChainNode(tongueGroup, segIdx);
    var thick = segThickness(segIdx);
    var drip = new THREE.Mesh(new THREE.SphereGeometry(r, 4, 3), mat);
    drip.position.set(dx, -segLen, -thick / 2 - r * 0.3);
    drip.userData.isDrip = true;
    node.add(drip);
  }

  // Hanging strand + drop — counter-rotated to hang toward ground
  function addStrand(segIdx, dx, strandLen, mat) {
    var node = findChainNode(tongueGroup, segIdx);
    var thick = segThickness(segIdx);
    // Wrapper group that counter-rotates the strand to point downward
    // Accumulate all tilts from root to this segment
    var totalTilt = 0;
    var walkNode = tongueGroup;
    for (var ci = 0; ci <= segIdx; ci++) {
      for (var cc = 0; cc < walkNode.children.length; cc++) {
        if (walkNode.children[cc].userData && walkNode.children[cc].userData.tongueIdx === ci) {
          totalTilt += walkNode.children[cc].userData.baseTilt || 0;
          walkNode = walkNode.children[cc];
          break;
        }
      }
    }
    var strandGroup = new THREE.Group();
    strandGroup.position.set(dx, -segLen, -thick / 2);
    strandGroup.rotation.x = -totalTilt; // counter-rotate to hang straight down
    strandGroup.userData.isDrip = true;
    strandGroup.userData.isDripStrand = true;
    strandGroup.userData.dripPhase = Math.random() * Math.PI * 2;
    strandGroup.userData.dripSpeed = 1.5 + Math.random() * 2.0;
    var strand = new THREE.Mesh(new THREE.BoxGeometry(0.005, strandLen, 0.005), mat);
    strand.position.y = -strandLen / 2;
    strandGroup.add(strand);
    var drop = new THREE.Mesh(new THREE.SphereGeometry(0.010, 4, 3), mat);
    drop.position.y = -strandLen;
    strandGroup.add(drop);
    node.add(strandGroup);
  }

  // Saliva on top — short runs that pool, some drip off the sides
  var trailM = new THREE.MeshLambertMaterial({ color: 0xd0e8f8, transparent: true, opacity: 0.5 });
  var poolM = new THREE.MeshLambertMaterial({ color: 0xd0e8f8, transparent: true, opacity: 0.65 });

  // Short streak on top surface
  function addStreak(segIdx, dx, width) {
    var node = findChainNode(tongueGroup, segIdx);
    var thick = segThickness(segIdx);
    var streak = new THREE.Mesh(
      new THREE.CylinderGeometry(width * 0.5, width * 0.5, segLen * 1.1, 4, 1), trailM
    );
    streak.position.set(dx, -segLen / 2, thick / 2 + 0.001);
    node.add(streak);
  }

  // Pool blob on top — wider, flatter
  function addPool(segIdx, dx, radius) {
    var node = findChainNode(tongueGroup, segIdx);
    var thick = segThickness(segIdx);
    var pool = new THREE.Mesh(
      new THREE.CylinderGeometry(radius, radius, 0.003, 6, 1), poolM
    );
    pool.position.set(dx, -segLen / 2, thick / 2 + 0.002);
    pool.rotation.x = Math.PI / 2; // flat on surface
    node.add(pool);
  }

  // Side drip — runs off the edge of the tongue
  function addSideDrip(segIdx, side, strandLen) {
    var node = findChainNode(tongueGroup, segIdx);
    var frac = segIdx / (TONGUE_SEGS - 1);
    var segW = 0.10 * (1.0 - frac * 0.45);
    var thick = segThickness(segIdx);
    var sideX = side * segW / 2;
    // Small streak on top leading to edge
    var lead = new THREE.Mesh(
      new THREE.CylinderGeometry(0.003, 0.003, segLen * 0.6, 4, 1), trailM
    );
    lead.position.set(sideX * 0.7, -segLen / 2, thick / 2 + 0.001);
    node.add(lead);
    // Drip hanging off the side
    var strand = new THREE.Mesh(
      new THREE.BoxGeometry(0.003, strandLen, 0.003), dripM
    );
    strand.position.set(sideX, -segLen / 2, -strandLen / 2 + thick / 2);
    strand.rotation.x = Math.PI / 2; // hangs down from side
    strand.userData.isDrip = true;
    node.add(strand);
    var drop = new THREE.Mesh(
      new THREE.SphereGeometry(0.006, 4, 3), heavyDripM
    );
    drop.position.set(sideX, -segLen / 2, -strandLen + thick / 2);
    drop.userData.isDrip = true;
    node.add(drop);
  }

  // Short top runs (2-3 segments each) — bigger
  addStreak(2, 0.005, 0.016);
  addStreak(3, 0.005, 0.016);
  addPool(4, 0.005, 0.022);

  addStreak(6, -0.01, 0.014);
  addStreak(7, -0.01, 0.014);
  addPool(8, -0.01, 0.020);

  addStreak(10, 0.015, 0.012);
  addPool(11, 0.015, 0.018);

  addStreak(13, -0.005, 0.010);
  addStreak(14, -0.005, 0.010);

  // Side drips — bigger, with hanging saliva strand underneath
  addSideDrip(4, 1, 0.05);
  addSideDrip(8, -1, 0.06);
  addSideDrip(11, 1, 0.045);
  addSideDrip(14, -1, 0.04);

  // Extra hanging drips at the side drip locations
  addStrand(4, 0.04, 0.06, heavyDripM);
  addStrand(8, -0.035, 0.07, heavyDripM);
  addStrand(11, 0.03, 0.05, heavyDripM);
  addStrand(14, -0.03, 0.045, heavyDripM);

  // Scattered drip blobs along tongue underside — big and gloopy
  addDrip(3, -0.02, 0.016, heavyDripM);
  addDrip(5, 0.025, 0.018, heavyDripM);
  addDrip(7, -0.015, 0.020, heavyDripM);
  addDrip(9, 0.02, 0.017, dripM);
  addDrip(11, -0.02, 0.019, heavyDripM);
  addDrip(13, 0.015, 0.018, heavyDripM);
  addDrip(14, -0.01, 0.020, heavyDripM);
  addDrip(15, 0.0, 0.022, heavyDripM);

  // Hanging strands from mid-tongue
  addStrand(5, 0.01, 0.05, dripM);
  addStrand(9, -0.01, 0.07, heavyDripM);
  addStrand(12, 0.005, 0.04, dripM);

  // Tip strands — longer
  addStrand(15, -0.015, 0.10, heavyDripM);
  addStrand(15, 0.015, 0.08, heavyDripM);
  addStrand(15, 0.0, 0.07, dripM);

  // Saliva fling particles — stored on the group for animation
  var flingM = new THREE.MeshLambertMaterial({ color: 0xc0dff8, transparent: true, opacity: 0.8 });
  var flingParticles = [];
  var MAX_FLINGS = 15;
  for (var fi = 0; fi < MAX_FLINGS; fi++) {
    var fMesh = new THREE.Mesh(new THREE.SphereGeometry(0.014, 5, 4), flingM);
    fMesh.visible = false;
    fMesh.userData.vel = { x: 0, y: 0, z: 0 };
    fMesh.userData.life = 0;
    group.add(fMesh);
    flingParticles.push(fMesh);
  }
  group.userData.flingParticles = flingParticles;
  group.userData.findChainNode = findChainNode;
  group.userData.tongueGroup = tongueGroup;
  group.userData.TONGUE_SEGS = TONGUE_SEGS;
  group.userData.lastTipZ = 0;

  group.add(tongueGroup);

  // Arms — extend forward with grabby fingers
  [-1, 1].forEach(function(side) {
    var armGroup = new THREE.Group();
    armGroup.position.set(side * 0.20, 0.48, 0.08);
    armGroup.rotation.z = side * 0.85;    // wide spread outward
    armGroup.rotation.x = -1.5;          // really reaching forward
    armGroup.rotation.y = side * 1.2;  // roll so thumbs on top
    armGroup.userData.isArm = true;
    armGroup.userData.armSide = side;
    armGroup.userData.baseRZ = side * 0.85;
    armGroup.userData.baseRX = -1.5;
    armGroup.userData.baseRY = side * 1.2;

    // Upper arm
    var ua = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.14, 0.08), bodyM);
    ua.position.y = -0.07; ua.castShadow = true;
    armGroup.add(ua);

    // Palm
    var pm = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.04, 0.06), pawM);
    pm.position.y = -0.16;
    armGroup.add(pm);

    // Build a finger chain: 2 segments, returns the root group
    function makeFingerChain(px, py, pz, rotZ, isThumb) {
      var len1 = isThumb ? 0.016 : 0.02;
      var len2 = isThumb ? 0.014 : 0.016;
      var w = isThumb ? 0.016 : 0.013;

      var seg1 = new THREE.Group();
      seg1.position.set(px, py, pz);
      seg1.rotation.z = rotZ || 0;
      seg1.userData.isFingerSeg = true;
      var m1 = new THREE.Mesh(new THREE.BoxGeometry(w, len1, w), pawM);
      m1.position.y = -len1 / 2;
      seg1.add(m1);

      var seg2 = new THREE.Group();
      seg2.position.y = -len1;
      seg2.userData.isFingerSeg = true;
      var m2 = new THREE.Mesh(new THREE.BoxGeometry(w * 0.85, len2, w * 0.85), pawM);
      m2.position.y = -len2 / 2;
      seg2.add(m2);

      seg1.add(seg2);
      return seg1;
    }

    // 3 fingers
    armGroup.add(makeFingerChain(-0.02, -0.18, 0, 0, false));
    armGroup.add(makeFingerChain(0.0, -0.19, 0, 0, false));
    armGroup.add(makeFingerChain(0.02, -0.18, 0, 0, false));
    // Thumb — angled outward
    armGroup.add(makeFingerChain(side * -0.035, -0.16, 0.015, side * -0.5, true));

    group.add(armGroup);
  });

  // Legs + feet + toes
  [-0.10, 0.10].forEach(function(x) {
    box("Leg", 0.10, 0.14, 0.10, x, 0.06, 0.06, bodyM);
    box("Foot", 0.10, 0.04, 0.14, x, -0.02, 0.08, pawM);
    for (var t = 0; t < 3; t++) {
      box("Toe", 0.02, 0.02, 0.03, x - 0.03 + t * 0.03, -0.03, 0.16, pawM);
    }
  });

  // Tail (flat beaver paddle) — attached at body back, angled 45° down
  var tailGroup = new THREE.Group();
  tailGroup.position.set(0, 0.15, -0.07); // attach at bottom-back of body
  tailGroup.rotation.x = 0.75; // ~45° angle downward-backward

  var tailMain = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.28, 0.04), tailM);
  tailMain.position.y = -0.14; // hang from pivot
  tailMain.castShadow = true;
  tailGroup.add(tailMain);

  // Waffle grid on both faces
  var waffleMat = mat(c.tailFace);
  var wRows = 5, wCols = 5;
  var wW = 0.24, wH = 0.24;
  [-0.025, 0.025].forEach(function(zOff) { // front and back of tail surfaces
    for (var wr = 0; wr <= wRows; wr++) {
      var wy = -0.14 - wH / 2 + (wr / wRows) * wH;
      var wh = new THREE.Mesh(new THREE.BoxGeometry(wW, 0.006, 0.008), waffleMat);
      wh.position.set(0, wy, zOff);
      tailGroup.add(wh);
    }
    for (var wc = 0; wc <= wCols; wc++) {
      var wx = -wW / 2 + (wc / wCols) * wW;
      var wv = new THREE.Mesh(new THREE.BoxGeometry(0.006, wH, 0.008), waffleMat);
      wv.position.set(wx, -0.14, zOff);
      tailGroup.add(wv);
    }
  });

  tailGroup.userData.isTail = true;
  group.add(tailGroup);

  // Whiskers
  [-1, 1].forEach(function(side) {
    for (var i = 0; i < 2; i++) {
      var w = box("Whisker", 0.12, 0.005, 0.005,
        side * 0.18, 0.62 + i * 0.03, 0.26, whiskerM);
      w.userData.isFace = true; w.userData.baseY = 0.62 + i * 0.03;
    }
  });

  // Prison stripes — alternating black & white horizontal bands
  if (c.stripes) {
    var whiteM = mat(0xf0f0f0);
    var blackM = mat(0x111111);
    var stripeH = 0.042;
    var bodyBottom = 0.09;
    for (var si = 0; si < 10; si++) {
      var sy = bodyBottom + si * stripeH;
      var sm = (si % 2 === 0) ? blackM : whiteM;
      box("Stripe", 0.40, stripeH, 0.32, 0, sy + stripeH / 2, 0.08, sm);
    }
  }

  // Crown (for gold variant)
  if (c.crown) {
    var crownM = mat(0xFFD700);
    box("CrownBase", 0.30, 0.05, 0.20, 0, 0.88, 0.10, crownM);
    [-0.08, 0, 0.08].forEach(function(x) {
      box("CrownSpike", 0.05, 0.08, 0.05, x, 0.94, 0.10, crownM);
    });
  }

  if (targetScene) targetScene.add(group);
  return group;
}

// ═══════════════════════════════════════════════════
// CARD PREVIEW RENDERERS
// ═══════════════════════════════════════════════════
var activePreviewIdx = 0;
var previewRenderer = null;
var previewClock = new THREE.Clock();

function initCardPreviews() {
  // Single shared offscreen renderer
  var offCanvas = document.createElement('canvas');
  offCanvas.width = 200; offCanvas.height = 200;
  previewRenderer = new THREE.WebGLRenderer({ canvas: offCanvas, alpha: true, antialias: false });
  previewRenderer.setSize(200, 200);

  var pCam = new THREE.PerspectiveCamera(50, 1, 0.01, 50);
  pCam.position.set(0, 0.7, 2.0);
  pCam.lookAt(0, 0.45, 0);

  MODELS.forEach(function(m, i) {
    var card = document.getElementById('card-' + m.id);
    if (!card) return;
    var cvs = card.querySelector('canvas');
    if (!cvs) return;

    var pScene = new THREE.Scene();
    var amb = new THREE.AmbientLight(0xffffff, 0.7);
    pScene.add(amb);
    var dir = new THREE.DirectionalLight(0xfff5e0, 1.2);
    dir.position.set(3, 8, 5);
    pScene.add(dir);

    var lickGroup = buildLickalotapus(m.colors, pScene);
    lickGroup.rotation.y = 0.3;
    previewScenes.push({ scene: pScene, camera: pCam, model: lickGroup, canvas: cvs });

    // Render static preview once
    previewRenderer.render(pScene, pCam);
    var ctx2d = cvs.getContext('2d');
    cvs.width = 200; cvs.height = 200;
    ctx2d.drawImage(offCanvas, 0, 0);

    // Hover/touch activates animation
    card.addEventListener('mouseenter', function() { activePreviewIdx = i; });
    card.addEventListener('touchstart', function() { activePreviewIdx = i; }, { passive: true });
  });
}

function animatePreviews() {
  requestAnimationFrame(animatePreviews);
  var lb = document.getElementById('model-lightbox');
  if (lb && lb.classList.contains('hidden')) return;
  if (!previewRenderer) return;

  var t = previewClock.getElapsedTime();
  previewScenes.forEach(function(p, i) {
    // Each card gets a slight time offset so they don't move in sync
    var pt = t + i * 0.7;
    p.model.rotation.y = Math.sin(pt * 0.8) * 0.5;
    p.model.children.forEach(function(child) {
      if (child.userData.isTongue) {
          animateTongueChain(child, pt);
        }
    });
    previewRenderer.render(p.scene, p.camera);
    var ctx2d = p.canvas.getContext('2d');
    ctx2d.clearRect(0, 0, 200, 200);
    ctx2d.drawImage(previewRenderer.domElement, 0, 0);
  });
}

// ═══════════════════════════════════════════════════
// LIGHTBOX — Render Cards & Logic
// ═══════════════════════════════════════════════════
function renderLightboxCards() {
  var grid = document.getElementById('lb-grid');
  var html = '';

  MODELS.forEach(function(m) {
    var traits = m.traits.map(function(t) { return '<span class="trait-pill">' + t + '</span>'; }).join('');
    html += '<div class="model-card" id="card-' + m.id + '" onclick="selectModel(\'' + m.id + '\')">' +
      '<div class="card-preview"><canvas></canvas>' +
        '<div class="card-tag-wrap"><div class="card-tag"><span>' + m.tag + '</span></div></div>' +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + m.name + '</div>' +
        '<div class="card-desc">' + m.desc + '</div>' +
        '<div class="card-traits">' + traits + '</div>' +
      '</div>' +
    '</div>';
  });


  grid.innerHTML = html;
}

function openLightbox() {
  clearScene();
  document.getElementById('model-lightbox').classList.remove('hidden');
  document.getElementById('ui').classList.remove('active');
  document.getElementById('tap-plane').style.display = 'none';
}

function closeLightbox() {
  document.getElementById('model-lightbox').classList.add('hidden');
  document.getElementById('ui').classList.add('active');
  document.getElementById('tap-plane').style.display = 'block';
}

window.openLightbox = openLightbox;

window.selectModel = function(id) {
  var m = MODELS.find(function(x) { return x.id === id; });
  if (!m) return;
  selectedModel = m;
  document.getElementById('model-label').innerHTML = m.name.toUpperCase();
  closeLightbox();
  // Auto-place the model in view
  var dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  dir.y = 0; dir.normalize();
  var pos = camera.position.clone().addScaledVector(dir, 3);
  pos.y = 1.0;
  placeAt(pos);
};

// ═══════════════════════════════════════════════════
// MAIN THREE.JS SCENE
// ═══════════════════════════════════════════════════
async function init() {
  scene = new THREE.Scene();
  clock = new THREE.Clock();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(0, 1.6, 0);

  var canvas = document.getElementById('ar-canvas');
  renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.outputEncoding = THREE.sRGBEncoding;

  var ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);
  var sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
  sun.position.set(3, 8, 5); sun.castShadow = true;
  scene.add(sun);
  var fill = new THREE.DirectionalLight(0xc0e8ff, 0.4);
  fill.position.set(-4, 2, -3);
  scene.add(fill);

  var shadowGeo = new THREE.PlaneGeometry(20, 20);
  var shadowMat = new THREE.ShadowMaterial({ opacity: 0.25 });
  var shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = 0;
  shadowPlane.receiveShadow = true;
  scene.add(shadowPlane);

  await startCamera();

  window.addEventListener('resize', onResize);
  // Tap-to-place removed — model is placed automatically
  document.getElementById('tap-plane').addEventListener('touchstart', onTouchStart, { passive: false });
  document.getElementById('tap-plane').addEventListener('touchmove', onTouchMove, { passive: false });
  document.getElementById('tap-plane').addEventListener('touchend', onTouchEnd, { passive: false });
  document.getElementById('tap-plane').addEventListener('mousedown', onMouseDragStart);
  window.addEventListener('mousemove', onMouseDragMove);
  window.addEventListener('mouseup', onMouseDragEnd);

  animate();

  renderLightboxCards();
  initCardPreviews();
  animatePreviews();

  initPositionSliders();
  initDpad();
  initTiltJoystick();
  initRotationDial();
  initScaleSlider();
  initZSlider();
  initStyleStudio();

  document.getElementById('loading-screen').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════
var currentFacing = 'environment';

async function startCamera(facing) {
  if (facing) currentFacing = facing;
  try {
    // Stop any existing stream
    var video = document.getElementById('camera-feed');
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(function(t) { t.stop(); });
    }
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: currentFacing }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    // Mirror front camera
    video.style.transform = currentFacing === 'user' ? 'scaleX(-1)' : '';
    await video.play();
  } catch (err) {
    showError(err.name === 'NotAllowedError'
      ? 'Camera access denied. Tap Retry and allow camera permissions.'
      : 'Could not access camera: ' + err.message);
  }
}

async function flipCamera() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  await startCamera(currentFacing);
}
window.flipCamera = flipCamera;

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-screen').style.display = 'flex';
}

// ═══════════════════════════════════════════════════
// TAP TO PLACE
// ═══════════════════════════════════════════════════
function getPlacePosition(clientX, clientY) {
  var ndcX = (clientX / window.innerWidth) * 2 - 1;
  var ndcY = -(clientY / window.innerHeight) * 2 + 1;
  var raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
  var groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  var target = new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane, target);
  var dist = target.distanceTo(camera.position);
  if (dist < 0.5 || dist > 8) {
    var dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    target.copy(camera.position).addScaledVector(dir, 2.5);
    target.y = 0;
  }
  return target;
}

function onTap(e) {
  if (e.target.closest('button')) return;
  var pos = getPlacePosition(e.clientX, e.clientY);
  placeAt(pos);
}

function placeAt(pos) {
  if (selectedModel) {
    if (modelGroup) { scene.remove(modelGroup); modelGroup = null; }
    modelGroup = buildLickalotapus(selectedModel.colors, null);
    modelGroup.position.copy(pos);
    scene.add(modelGroup);
  } else {
    return;
  }
  placed = true;
  document.getElementById('crosshair').classList.add('placed');
  document.getElementById('control-cluster').classList.add('show');
  document.getElementById('mobile-dpad').classList.add('show');
  var bc = document.getElementById('btn-clear'); if (bc) bc.style.display = '';
  document.getElementById('btn-shoot').style.display = '';
  setHint('');
  updateScaleSliderFromModel();
  var badge = document.getElementById('placed-badge');
  badge.classList.add('show');
  setTimeout(function() { badge.classList.remove('show'); }, 1200);
}

// ═══════════════════════════════════════════════════
// TAP-PLANE TOUCH (single-finger drag = tilt/rotate, two-finger pinch = scale)
// ═══════════════════════════════════════════════════
var dragStart = null;
var dragRotStart = 0, dragTiltXStart = 0, dragTiltZStart = 0;
var DRAG_ROT_SPEED = 0.006;   // horizontal drag → Y rotation
var DRAG_TILT_SPEED = 0.004;  // vertical drag → X tilt

function onTouchStart(e) {
  e.preventDefault();
  if (!placed || !modelGroup) return;
  if (e.touches.length === 2) {
    pinchDist0 = getPinchDist(e);
    modelScale0 = modelGroup.scale.x;
    dragStart = null; // cancel single-finger drag
  } else if (e.touches.length === 1) {
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    dragRotStart = modelGroup.rotation.y;
    dragTiltXStart = modelGroup.rotation.x;
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (!placed || !modelGroup) return;
  if (e.touches.length === 2 && pinchDist0) {
    var dist = getPinchDist(e);
    var ratio = dist / pinchDist0;
    var s = Math.max(0.1, Math.min(5, modelScale0 * ratio));
    modelGroup.scale.setScalar(s);
    updateScaleSliderFromModel();
  } else if (e.touches.length === 1 && dragStart) {
    var dx = e.touches[0].clientX - dragStart.x;
    var dy = e.touches[0].clientY - dragStart.y;
    // Horizontal drag → Y rotation (yaw)
    modelGroup.rotation.y = dragRotStart + dx * DRAG_ROT_SPEED;
    // Vertical drag → X rotation (pitch), clamped
    modelGroup.rotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, dragTiltXStart + dy * DRAG_TILT_SPEED));
  }
}
function onTouchEnd(e) {
  if (e.touches.length === 0) { pinchDist0 = null; dragStart = null; }
}
function getPinchDist(e) {
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// ═══════════════════════════════════════════════════
// MOUSE DRAG (desktop pitch/yaw)
// ═══════════════════════════════════════════════════
var mouseDragStart = null;
var mouseDragRotStart = 0, mouseDragTiltStart = 0;
var mouseDragging = false;

function onMouseDragStart(e) {
  if (!placed || !modelGroup) return;
  if (e.button !== 0) return; // left click only
  mouseDragStart = { x: e.clientX, y: e.clientY };
  mouseDragRotStart = modelGroup.rotation.y;
  mouseDragTiltStart = modelGroup.rotation.x;
  mouseDragging = false;
}
function onMouseDragMove(e) {
  if (!mouseDragStart || !modelGroup) return;
  var dx = e.clientX - mouseDragStart.x;
  var dy = e.clientY - mouseDragStart.y;
  if (!mouseDragging && Math.abs(dx) + Math.abs(dy) > 5) mouseDragging = true;
  if (!mouseDragging) return;
  modelGroup.rotation.y = mouseDragRotStart + dx * DRAG_ROT_SPEED;
  modelGroup.rotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, mouseDragTiltStart + dy * DRAG_TILT_SPEED));
}
function onMouseDragEnd(e) {
  if (mouseDragging) {
    // Prevent the click event from firing after a drag
    e.preventDefault();
    var plane = document.getElementById('tap-plane');
    var suppress = function(ev) { ev.stopPropagation(); plane.removeEventListener('click', suppress, true); };
    plane.addEventListener('click', suppress, true);
  }
  mouseDragStart = null;
  mouseDragging = false;
}

// ═══════════════════════════════════════════════════
// POSITION SLIDERS (X horizontal, Y vertical in L-shape)
// ═══════════════════════════════════════════════════
var posXActive = false, posYActive = false;
var POS_RANGE = 4.0;
var POS_Y_MIN = -2.0, POS_Y_MAX = 4.0;

function initPositionSliders() {
  var xSlider = document.getElementById('pos-x-slider');
  var xThumb = document.getElementById('pos-x-thumb');
  var ySlider = document.getElementById('pos-y-slider');
  var yThumb = document.getElementById('pos-y-thumb');

  function applyX(clientX) {
    if (!modelGroup) return;
    var r = xSlider.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    modelGroup.position.x = -POS_RANGE + pct * (POS_RANGE * 2);
    xThumb.style.left = (pct * 100) + '%';
  }
  function applyY(clientY) {
    if (!modelGroup) return;
    var r = ySlider.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientY - r.top) / r.height));
    // Top = high Y, bottom = low Y
    modelGroup.position.y = POS_Y_MAX - pct * (POS_Y_MAX - POS_Y_MIN);
    yThumb.style.top = (pct * 100) + '%';
  }

  xSlider.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); posXActive = true; xThumb.classList.add('dragging'); applyX(e.touches[0].clientX); }, { passive: false });
  xSlider.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); posXActive = true; xThumb.classList.add('dragging'); applyX(e.clientX); });
  ySlider.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); posYActive = true; yThumb.classList.add('dragging'); applyY(e.touches[0].clientY); }, { passive: false });
  ySlider.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); posYActive = true; yThumb.classList.add('dragging'); applyY(e.clientY); });

  window.addEventListener('touchmove', function(e) {
    if (posXActive) { e.preventDefault(); applyX(e.touches[0].clientX); }
    if (posYActive) { e.preventDefault(); applyY(e.touches[0].clientY); }
  }, { passive: false });
  window.addEventListener('mousemove', function(e) {
    if (posXActive) applyX(e.clientX);
    if (posYActive) applyY(e.clientY);
  });
  window.addEventListener('touchend', function() {
    if (posXActive) { posXActive = false; xThumb.classList.remove('dragging'); }
    if (posYActive) { posYActive = false; yThumb.classList.remove('dragging'); }
  });
  window.addEventListener('mouseup', function() {
    if (posXActive) { posXActive = false; xThumb.classList.remove('dragging'); }
    if (posYActive) { posYActive = false; yThumb.classList.remove('dragging'); }
  });
}

function updatePositionSlidersFromModel() {
  if (!modelGroup) return;
  var xPct = (modelGroup.position.x + POS_RANGE) / (POS_RANGE * 2);
  var yPct = (POS_Y_MAX - modelGroup.position.y) / (POS_Y_MAX - POS_Y_MIN);
  var xT = document.getElementById('pos-x-thumb');
  var yT = document.getElementById('pos-y-thumb');
  if (xT) xT.style.left = Math.max(0, Math.min(100, xPct * 100)) + '%';
  if (yT) yT.style.top = Math.max(0, Math.min(100, yPct * 100)) + '%';
}

// ═══════════════════════════════════════════════════
// MOBILE D-PAD
// ═══════════════════════════════════════════════════
var dpadInterval = null;
var DPAD_STEP = 0.06;

function initDpad() {
  ['up', 'down', 'left', 'right'].forEach(function(dir) {
    var btn = document.getElementById('dpad-' + dir);
    function startMove(e) {
      e.preventDefault(); e.stopPropagation();
      if (dpadInterval) clearInterval(dpadInterval);
      dpadMove(dir);
      dpadInterval = setInterval(function() { dpadMove(dir); }, 50);
    }
    function stopMove(e) {
      e.preventDefault();
      if (dpadInterval) { clearInterval(dpadInterval); dpadInterval = null; }
    }
    btn.addEventListener('touchstart', startMove, { passive: false });
    btn.addEventListener('mousedown', startMove);
    btn.addEventListener('touchend', stopMove, { passive: false });
    btn.addEventListener('touchcancel', stopMove, { passive: false });
    btn.addEventListener('mouseup', stopMove);
    btn.addEventListener('mouseleave', stopMove);
  });
}

function dpadMove(dir) {
  if (!modelGroup) return;
  if (dir === 'up') modelGroup.position.y = Math.min(POS_Y_MAX, modelGroup.position.y + DPAD_STEP);
  else if (dir === 'down') modelGroup.position.y = Math.max(POS_Y_MIN, modelGroup.position.y - DPAD_STEP);
  else if (dir === 'left') modelGroup.position.x = Math.max(-POS_RANGE, modelGroup.position.x - DPAD_STEP);
  else if (dir === 'right') modelGroup.position.x = Math.min(POS_RANGE, modelGroup.position.x + DPAD_STEP);
  updatePositionSlidersFromModel();
}

// ═══════════════════════════════════════════════════
// ROTATION DIAL
// ═══════════════════════════════════════════════════
var dialActive = false, dialStartAngle = 0, dialModelStartY = 0;

function initRotationDial() {
  var dial = document.getElementById('rotation-dial');
  var marker = document.getElementById('dial-marker');
  var degrees = document.getElementById('dial-degrees');

  function getAngle(cx, cy) {
    var r = dial.getBoundingClientRect();
    return Math.atan2(cy - (r.top + r.height / 2), cx - (r.left + r.width / 2));
  }
  function start(cx, cy) {
    dialActive = true;
    dialStartAngle = getAngle(cx, cy);
    dialModelStartY = modelGroup ? modelGroup.rotation.y : 0;
  }
  function move(cx, cy) {
    if (!dialActive || !modelGroup) return;
    var delta = getAngle(cx, cy) - dialStartAngle;
    modelGroup.rotation.y = dialModelStartY + delta;
    var displayAngle = ((modelGroup.rotation.y % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    var deg = Math.round(displayAngle * 180 / Math.PI);
    marker.style.transform = 'translateX(-50%) rotate(' + displayAngle + 'rad)';
    marker.style.transformOrigin = '50% ' + (dial.offsetHeight / 2 - 2) + 'px';
    degrees.textContent = deg + '\u00B0';
  }
  function end() { dialActive = false; }

  dial.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); start(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  dial.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); start(e.clientX, e.clientY); });
  window.addEventListener('touchmove', function(e) { if (dialActive) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (dialActive) move(e.clientX, e.clientY); });
  window.addEventListener('touchend', function() { if (dialActive) end(); });
  window.addEventListener('mouseup', function() { if (dialActive) end(); });
}

// ═══════════════════════════════════════════════════
// SCALE SLIDER
// ═══════════════════════════════════════════════════
var scaleSliderActive = false;

function initScaleSlider() {
  var container = document.getElementById('scale-slider-container');
  var thumb = document.getElementById('scale-thumb');
  var label = document.getElementById('scale-label');
  var MIN_S = 0.1, MAX_S = 5.0;

  function apply(clientY) {
    if (!modelGroup) return;
    var r = container.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientY - r.top) / r.height));
    var s = MAX_S - pct * (MAX_S - MIN_S);
    modelGroup.scale.setScalar(s);
    thumb.style.top = (pct * 100) + '%';
    label.textContent = Math.round(s * 100) + '%';
  }
  container.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); scaleSliderActive = true; thumb.classList.add('dragging'); apply(e.touches[0].clientY); }, { passive: false });
  container.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); scaleSliderActive = true; thumb.classList.add('dragging'); apply(e.clientY); });
  window.addEventListener('touchmove', function(e) { if (scaleSliderActive) { e.preventDefault(); apply(e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (scaleSliderActive) apply(e.clientY); });
  window.addEventListener('touchend', function() { if (scaleSliderActive) { scaleSliderActive = false; thumb.classList.remove('dragging'); } });
  window.addEventListener('mouseup', function() { if (scaleSliderActive) { scaleSliderActive = false; thumb.classList.remove('dragging'); } });
}

function updateScaleSliderFromModel() {
  if (!modelGroup) return;
  var s = modelGroup.scale.x;
  var pct = (5.0 - s) / (5.0 - 0.1);
  var thumb = document.getElementById('scale-thumb');
  var label = document.getElementById('scale-label');
  if (thumb) thumb.style.top = Math.max(0, Math.min(100, pct * 100)) + '%';
  if (label) label.textContent = Math.round(s * 100) + '%';
}

// ═══════════════════════════════════════════════════
// TILT JOYSTICK
// ═══════════════════════════════════════════════════
var tiltActive = false, tiltDx = 0, tiltDy = 0, tiltAnimFrame = null;
var TILT_RADIUS = 20, TILT_SPEED = 0.003;

function initTiltJoystick() {
  var container = document.getElementById('tilt-container');
  var knob = document.getElementById('tilt-knob');
  var center = { x: 0, y: 0 };

  function start(cx, cy) {
    var r = container.getBoundingClientRect();
    center = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    tiltActive = true;
    knob.classList.add('dragging');
    move(cx, cy);
    if (!tiltAnimFrame) loop();
  }
  function move(cx, cy) {
    var dx = cx - center.x, dy = cy - center.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > TILT_RADIUS) { dx = dx / dist * TILT_RADIUS; dy = dy / dist * TILT_RADIUS; }
    tiltDx = dx / TILT_RADIUS;
    tiltDy = dy / TILT_RADIUS;
    knob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
  }
  function end() {
    tiltActive = false; tiltDx = 0; tiltDy = 0;
    knob.classList.remove('dragging');
    knob.style.transform = 'translate(-50%, -50%)';
    if (tiltAnimFrame) { cancelAnimationFrame(tiltAnimFrame); tiltAnimFrame = null; }
  }
  function loop() {
    if (!tiltActive) { tiltAnimFrame = null; return; }
    if (modelGroup && (Math.abs(tiltDx) > 0.05 || Math.abs(tiltDy) > 0.05)) {
      // tiltDy = forward/back tilt (X rotation), tiltDx = side tilt (Z rotation)
      modelGroup.rotation.x += tiltDy * TILT_SPEED;
      modelGroup.rotation.z -= tiltDx * TILT_SPEED;
      // Clamp to reasonable range
      modelGroup.rotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, modelGroup.rotation.x));
      modelGroup.rotation.z = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, modelGroup.rotation.z));
    }
    tiltAnimFrame = requestAnimationFrame(loop);
  }
  container.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); start(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  container.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); start(e.clientX, e.clientY); });
  window.addEventListener('touchmove', function(e) { if (tiltActive) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (tiltActive) move(e.clientX, e.clientY); });
  window.addEventListener('touchend', function(e) { if (tiltActive && e.touches.length === 0) end(); });
  window.addEventListener('mouseup', function() { if (tiltActive) end(); });
}

// ═══════════════════════════════════════════════════
// Z (DEPTH) SLIDER
// ═══════════════════════════════════════════════════
var zSliderActive = false;

function initZSlider() {
  var container = document.getElementById('z-slider-container');
  var thumb = document.getElementById('z-thumb');
  var label = document.getElementById('z-label');
  var isPortrait = window.innerHeight > window.innerWidth;
  var MIN_Z = -10.0, MAX_Z = isPortrait ? -5.0 : -2.0;
  window.addEventListener('resize', function() {
    isPortrait = window.innerHeight > window.innerWidth;
    MAX_Z = isPortrait ? -5.0 : -2.0;
  });

  function apply(clientX) {
    if (!modelGroup) return;
    var r = container.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    // Left = far (MIN_Z), right = near (MAX_Z)
    var z = MIN_Z + pct * (MAX_Z - MIN_Z);
    modelGroup.position.z = z;
    thumb.style.left = (pct * 100) + '%';
    label.textContent = 'Z:' + z.toFixed(1);
  }
  container.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); zSliderActive = true; thumb.classList.add('dragging'); apply(e.touches[0].clientX); }, { passive: false });
  container.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); zSliderActive = true; thumb.classList.add('dragging'); apply(e.clientX); });
  window.addEventListener('touchmove', function(e) { if (zSliderActive) { e.preventDefault(); apply(e.touches[0].clientX); } }, { passive: false });
  window.addEventListener('mousemove', function(e) { if (zSliderActive) apply(e.clientX); });
  window.addEventListener('touchend', function() { if (zSliderActive) { zSliderActive = false; thumb.classList.remove('dragging'); } });
  window.addEventListener('mouseup', function() { if (zSliderActive) { zSliderActive = false; thumb.classList.remove('dragging'); } });
}

// Scroll wheel also scales
window.addEventListener('wheel', function(e) {
  if (!placed || !modelGroup) return;
  e.preventDefault();
  var delta = e.deltaY * -0.001;
  var s = Math.max(0.1, Math.min(5, modelGroup.scale.x + delta));
  modelGroup.scale.setScalar(s);
  updateScaleSliderFromModel();
}, { passive: false });

// ═══════════════════════════════════════════════════
// IDLE ANIMATION
// ═══════════════════════════════════════════════════
var tongueParams = {
  swayAmp: 0.22, swaySpd: 6.0, swayPhase: 0.40,
  flickAmp: 0.15, flickSpd: 16.0, flickPhase: 0.50, flickStart: 0.65,
  bobAmp: 0.14, bobSpd: 4.5, bobPhase: 0.55,
  extendSpd: 1.8, curlAmt: 0.20, overallSway: 0.06
};


function animateTongueChain(tongueGroup, t) {
  var tp = tongueParams;

  // Overall tongue sway — slow lazy drift
  tongueGroup.rotation.y = Math.sin(t * 0.8) * tp.overallSway;

  // Extend/retract
  var extendCycle = (Math.sin(t * tp.extendSpd) + 1) * 0.5;
  var extend = extendCycle + Math.max(0, Math.sin(t * 6.0)) * 0.2;

  // Speed variation — eel-like darting: fast bursts then slow glides
  var speedMod = 1.0 + Math.max(0, Math.sin(t * 1.5)) * 0.6; // 1.0 to 1.6x speed

  // Walk the chain
  var node = tongueGroup.children[0];
  var idx = 0;
  while (node && node.userData.tongueIdx !== undefined) {
    var baseTilt = node.userData.baseTilt || 0;
    var curl = (1.0 - extend) * tp.curlAmt;
    var frac = idx / 16;

    // Looseness: fast ramp, loose by 1/3
    var looseness = 1.0 - Math.exp(-frac * 4.0);

    // Momentum: tip moves more than base (eel whip effect)
    var momentum = 0.4 + frac * 0.6; // 0.4 at base, 1.0 at tip

    // === EEL S-CURVE: always travelling outward ===
    // Large phase offset per segment = visible full sine wave along length
    // Negative time = wave always travels base→tip
    var phase = t * tp.swaySpd * speedMod - idx * tp.swayPhase;

    // Horizontal S-curve — the main eel slither
    var slitherZ = Math.sin(phase) * tp.swayAmp * momentum;

    // Tip whip — fast, building at the end
    var whipA = Math.max(0, (frac - tp.flickStart) / (1.0 - tp.flickStart)) * tp.flickAmp;
    var whip = Math.sin(t * tp.flickSpd * speedMod - idx * tp.flickPhase) * whipA * momentum;

    node.rotation.z = slitherZ + whip;

    // === Vertical wave at different frequency (3D motion) ===
    var vertPhase = t * tp.bobSpd * speedMod * 0.7 - idx * tp.bobPhase * 1.3;
    var vertWave = Math.sin(vertPhase) * tp.bobAmp * momentum;

    // Light gravity
    var gravity = looseness * 0.04;

    node.rotation.x = baseTilt - curl + gravity + vertWave;

    idx++;
    node = node.children[0] || null;
  }
}

// Blink state
var blinkTimer = 0;
var blinkState = 0; // 0=open, 1=closing, 2=closed, 3=opening
var blinkDuration = 0.12;
var blinkSide = 'both'; // 'both', 'L', or 'R'
var nextBlinkAt = 1.5 + Math.random() * 2;

function updateBlink(t, dt) {
  blinkTimer += dt;
  if (blinkState === 0 && blinkTimer > nextBlinkAt) {
    blinkState = 1;
    blinkTimer = 0;
    // 20% chance of wink instead of blink
    if (Math.random() < 0.2) {
      blinkSide = Math.random() < 0.5 ? 'L' : 'R';
    } else {
      blinkSide = 'both';
    }
    nextBlinkAt = 1.5 + Math.random() * 2;
  }
  if (blinkState === 1 && blinkTimer > blinkDuration) { blinkState = 2; blinkTimer = 0; }
  if (blinkState === 2 && blinkTimer > 0.06) { blinkState = 3; blinkTimer = 0; }
  if (blinkState === 3 && blinkTimer > blinkDuration) { blinkState = 0; blinkTimer = 0; }
}

function getEyelidScale(side) {
  var active = (blinkSide === 'both' || blinkSide === side);
  if (!active) return 0;
  if (blinkState === 0) return 0;
  if (blinkState === 1) return blinkTimer / blinkDuration; // closing
  if (blinkState === 2) return 1; // fully closed
  if (blinkState === 3) return 1 - blinkTimer / blinkDuration; // opening
  return 0;
}

// Ear flicker state
var earFlickTimer = 0;
var earFlickActive = false;
var earFlickSide = 0; // -1=left, 1=right, 0=both
var nextEarFlickAt = 3 + Math.random() * 5;
var earFlickPhase = 0;

function updateEarFlick(t, dt) {
  earFlickTimer += dt;
  if (!earFlickActive && earFlickTimer > nextEarFlickAt) {
    earFlickActive = true;
    earFlickTimer = 0;
    earFlickPhase = 0;
    // Random: one ear or both
    var r = Math.random();
    if (r < 0.4) earFlickSide = -1;
    else if (r < 0.8) earFlickSide = 1;
    else earFlickSide = 0;
    nextEarFlickAt = 2 + Math.random() * 5;
  }
  if (earFlickActive) {
    earFlickPhase += dt * 12; // fast flick
    if (earFlickPhase > Math.PI * 3) { // ~1.5 flicks then stop
      earFlickActive = false;
      earFlickTimer = 0;
    }
  }
}

function getEarFlick(side) {
  if (!earFlickActive) return 0;
  if (earFlickSide !== 0 && earFlickSide !== side) return 0;
  // Quick oscillation that decays
  var decay = Math.max(0, 1 - earFlickPhase / (Math.PI * 3));
  return Math.sin(earFlickPhase) * 0.25 * decay;
}

var lastAnimTime = 0;
function animateModel(t) {
  if (!modelGroup) return;
  var tp = tongueParams;
  var dt = t - lastAnimTime;
  lastAnimTime = t;

  updateBlink(t, dt);
  updateEarFlick(t, dt);

  // Tongue extend cycle (same as in animateTongueChain)
  var extendCycle = (Math.sin(t * tp.extendSpd) + 1) * 0.5;
  var lickPhase = Math.sin(t * tp.extendSpd); // -1 to 1

  modelGroup.children.forEach(function(child) {
    if (child.userData.isTongue) {
      animateTongueChain(child, t);
      return;
    }

    // Face parts (snout, mouth, teeth, nostrils) — bob up/down with lick
    if (child.userData.isFace) {
      child.position.y = child.userData.baseY - lickPhase * 0.008;
    }

    // Head parts (head, neck, ears, eyes) — subtle tilt with lick
    if (child.userData.isHead) {
      child.position.y = child.userData.baseY - lickPhase * 0.004;
      child.rotation.x = -lickPhase * 0.02;
      child.rotation.z = Math.sin(t * tp.extendSpd * 0.5) * 0.01;
      // Ear flicker — rotate Z for a quick twitch
      if (child.userData.isEar) {
        child.rotation.z += getEarFlick(child.userData.earSide) * child.userData.earSide;
      }
    }

    // Arms — sway + grabbing fingers
    if (child.userData.isArm && child.userData.baseRZ !== undefined) {
      var side = child.userData.armSide;
      // Hug motion: eager reaching and closing
      var hugCycle = Math.sin(t * 1.2) * 0.18; // bigger open/close
      var reach = Math.sin(t * 1.8 + side * 0.5) * 0.15; // more forward reach
      var lickLift = lickPhase * 0.06 * side;
      child.rotation.z = child.userData.baseRZ - hugCycle * side + lickLift;
      child.rotation.x = child.userData.baseRX + reach;
      child.rotation.y = child.userData.baseRY;

      // Grabbing cycle on fingers — curl in and out
      var grabPhase = (Math.sin(t * 2.5 + side * 1.0) + 1) * 0.5; // 0→1
      child.children.forEach(function(ch) {
        if (!ch.userData.isFingerSeg) return;
        // Curl: rotate X to close fingers inward
        ch.rotation.x = grabPhase * 0.8;
        // Also curl the second segment (child of this one)
        ch.children.forEach(function(inner) {
          if (inner.userData.isFingerSeg) {
            inner.rotation.x = grabPhase * 1.0;
          }
        });
      });
    }

    // Eyelids — thin line when open, scales down to cover eye when closing
    if (child.userData.isEyelid) {
      var lidAmt = getEyelidScale(child.userData.eyeSide);
      child.visible = true;
      child.scale.y = 0.15 + lidAmt * 0.85; // 0.15 = thin resting lid, 1.0 = fully closed
    }
  });

  // Animate drip strands — randomly stretch and shrink like dripping
  modelGroup.traverse(function(obj) {
    if (obj.userData.isDripStrand) {
      var phase = obj.userData.dripPhase;
      var speed = obj.userData.dripSpeed;
      // Sawtooth-ish cycle: slowly stretch, then snap back (drop falls)
      var cycle = ((t * speed + phase) % (Math.PI * 2)) / (Math.PI * 2); // 0→1
      var stretch;
      if (cycle < 0.8) {
        stretch = 0.5 + cycle * 0.75; // slowly grow from 0.5 to 1.1
      } else {
        stretch = 0.5; // snap back — drop fell
      }
      obj.scale.y = stretch;
    }
  });

  // Saliva fling particles — spawn when tongue tip is moving fast
  if (modelGroup.userData.flingParticles && modelGroup.userData.tongueGroup) {
    var particles = modelGroup.userData.flingParticles;
    var tg = modelGroup.userData.tongueGroup;
    var fcn = modelGroup.userData.findChainNode;
    var nSegs = modelGroup.userData.TONGUE_SEGS;

    // Get tip world position
    var tipNode = fcn(tg, nSegs - 1);
    var tipWorldPos = new THREE.Vector3();
    tipNode.getWorldPosition(tipWorldPos);

    // Detect fast movement — compare to last frame
    var lastZ = modelGroup.userData.lastTipZ || tipWorldPos.z;
    var tipSpeed = Math.abs(tipWorldPos.x - (modelGroup.userData.lastTipX || tipWorldPos.x)) +
                   Math.abs(tipWorldPos.z - lastZ);
    modelGroup.userData.lastTipX = tipWorldPos.x;
    modelGroup.userData.lastTipZ = tipWorldPos.z;

    // Spawn fling when tip is whipping fast
    if (tipSpeed > 0.006 && Math.random() < 0.35) {
      for (var pi = 0; pi < particles.length; pi++) {
        if (!particles[pi].visible) {
          var p = particles[pi];
          p.visible = true;
          // Convert world position to model-local position
          var localPos = tipWorldPos.clone();
          modelGroup.worldToLocal(localPos);
          p.position.copy(localPos);
          // Fling in the direction of motion + random spread
          p.userData.vel.x = (Math.random() - 0.5) * 0.06;
          p.userData.vel.y = -Math.random() * 0.025 - 0.008;
          p.userData.vel.z = (Math.random() - 0.5) * 0.06;
          p.userData.life = 1.0 + Math.random() * 0.6;
          p.scale.setScalar(0.8 + Math.random() * 1.0);
          break;
        }
      }
    }

    // Update existing particles
    for (var pi2 = 0; pi2 < particles.length; pi2++) {
      var pp = particles[pi2];
      if (!pp.visible) continue;
      pp.userData.life -= dt;
      if (pp.userData.life <= 0) { pp.visible = false; continue; }
      pp.position.x += pp.userData.vel.x * dt * 2;
      pp.position.y += pp.userData.vel.y * dt * 2;
      pp.position.z += pp.userData.vel.z * dt * 2;
      pp.userData.vel.y -= 0.015 * dt; // gravity
      pp.material.opacity = Math.min(0.6, pp.userData.life * 0.6);
    }
  }
}

function takeScreenshot() {
  var flash = document.getElementById('flash');
  flash.style.opacity = '0.9';
  setTimeout(function() { flash.style.opacity = '0'; }, 120);

  // Hide UI elements
  var hideEls = ['controls', 'crosshair', 'placed-badge', 'style-toggle', 'style-panel', 'shortcut-legend', 'control-cluster', 'mobile-dpad'];
  hideEls.forEach(function(id) { var el = document.getElementById(id); if (el) el.style.visibility = 'hidden'; });

  var video = document.getElementById('camera-feed');
  var arCanvas = document.getElementById('ar-canvas');

  var out = document.createElement('canvas');
  out.width = arCanvas.width;
  out.height = arCanvas.height;
  var ctx = out.getContext('2d');

  // Draw video (crop to match aspect)
  var vidW = video.videoWidth, vidH = video.videoHeight;
  var outAspect = out.width / out.height, vidAspect = vidW / vidH;
  var sx, sy, sw, sh;
  if (vidAspect > outAspect) { sh = vidH; sw = Math.round(vidH * outAspect); sx = Math.round((vidW - sw) / 2); sy = 0; }
  else { sw = vidW; sh = Math.round(vidW / outAspect); sx = 0; sy = Math.round((vidH - sh) / 2); }
  // Mirror video in screenshot when using front camera
  if (currentFacing === 'user') {
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, -out.width, 0, out.width, out.height);
    ctx.restore();
  } else {
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, out.width, out.height);
  }

  // Draw 3D overlay
  renderer.render(scene, camera);
  ctx.drawImage(arCanvas, 0, 0);

  // Themed watermark — match live HUD text sizes
  var wt = window.getWmTheme();
  var ss = window.getSubStyle();
  var ssWeight = (ss.weight === 'bold') ? 'bold ' : '';
  var ssItalic = ss.italic ? 'italic ' : '';

  // Read live sizes from DOM, scale by canvas/viewport ratio
  var titleEl = document.querySelector('#header .title');
  var subEl = document.querySelector('#header .sub');
  var scale = out.width / (arCanvas.clientWidth || out.width);
  var titleSize = Math.round((titleEl ? parseInt(getComputedStyle(titleEl).fontSize) : 22) * scale);
  var subSize = Math.round((subEl ? parseInt(getComputedStyle(subEl).fontSize) : 14) * scale);
  var headerPad = Math.round(8 * scale);

  // Top header gradient
  var headerH = headerPad + titleSize + subSize + 20;
  var hGrad = ctx.createLinearGradient(0, 0, 0, headerH);
  hGrad.addColorStop(0, wt.barBg); hGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, 0, out.width, headerH);

  ctx.textBaseline = 'top'; ctx.textAlign = 'center';
  ctx.shadowColor = wt.titleGlow; ctx.shadowBlur = 10;
  ctx.font = 'bold ' + titleSize + 'px Courier New';
  ctx.fillStyle = wt.titleColor;
  ctx.fillText('\u{1F445} LICKALOTAPUS', out.width / 2, headerPad);
  ctx.font = ssItalic + ssWeight + subSize + 'px ' + ss.fontLabel;
  ctx.fillStyle = ss.color; ctx.shadowColor = ss.color; ctx.shadowBlur = 6;
  ctx.fillText('In The Wild', out.width / 2, headerPad + titleSize * 1.3);
  ctx.shadowBlur = 0;

  // Bottom gradient with hashtag
  var hashSize = Math.round(subSize * 1.1);
  var bottomH = hashSize + Math.round(30 * scale);
  var bGrad = ctx.createLinearGradient(0, out.height, 0, out.height - bottomH);
  bGrad.addColorStop(0, wt.barBg); bGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bGrad;
  ctx.fillRect(0, out.height - bottomH, out.width, bottomH);

  ctx.textBaseline = 'bottom'; ctx.textAlign = 'center';
  ctx.font = 'bold ' + hashSize + 'px Courier New';
  ctx.fillStyle = wt.hashColor; ctx.shadowColor = wt.hashGlow; ctx.shadowBlur = 6;
  ctx.fillText('#LickalotapusInTheWild', out.width / 2, out.height - Math.round(10 * scale));
  ctx.shadowBlur = 0;

  // Restore UI
  hideEls.forEach(function(id) { var el = document.getElementById(id); if (el) el.style.visibility = ''; });

  out.toBlob(function(blob) {
    var file = new File([blob], 'lickalotapus-in-the-wild.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: 'Lickalotapus In The Wild',
        text: '#LickalotapusInTheWild'
      }).catch(function() {});
    } else {
      var link = document.createElement('a');
      link.download = file.name;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }
  }, 'image/png');

  setHint('SAVED! POST WITH #LickalotapusInTheWild');
  setTimeout(function() { setHint(placed ? '' : 'TAP ANYWHERE TO PLACE LICKALOTAPUS'); }, 8000);
}

  currentWmTheme = theme;
  document.querySelectorAll('.sp-theme-card').forEach(function(c) { c.classList.remove('active'); });
  card.classList.add('active');
  updateThemePreview();
  applyThemeToHUD();
  applySubStyle();
}

function updateThemePreview() {
  var t = currentWmTheme;
  var ssW = (t.subWeight === 'bold') ? 'font-weight:bold;' : '';
  var ssI = t.subItalic ? 'font-style:italic;' : '';
  var prev = document.getElementById('wm-theme-preview');
  if (!prev) return;
  prev.style.background = t.barBg;
  prev.style.borderColor = t.accent;
  prev.innerHTML =
    '<span style="font-family:\'Courier New\',monospace;font-size:12px;font-weight:bold;letter-spacing:3px;color:' + t.titleColor + ';text-shadow:0 0 8px ' + t.titleGlow + '">LICKALOTAPUS</span>' +
    '<span style="font-family:' + t.subFont + ';font-size:12px;' + ssW + ssI + 'color:' + t.subColor + '">In The Wild</span>' +
    '<span style="font-family:\'Courier New\',monospace;font-size:9px;color:' + t.hashColor + ';text-shadow:0 0 6px ' + t.hashGlow + '">#LickalotapusInTheWild</span>';
}

function applyThemeToHUD() {
  var t = currentWmTheme;
  var header = document.getElementById('header');
  if (header) header.style.background = 'linear-gradient(to bottom, ' + t.barBg + ', transparent)';
  var title = document.querySelector('#header .title');
  if (title) { title.style.color = t.titleColor; title.style.textShadow = '0 0 10px ' + t.titleGlow; }
  document.querySelectorAll('.ch-corner').forEach(function(c) { c.style.borderColor = t.accent; });
  var badge = document.getElementById('placed-badge');
  if (badge) { badge.style.borderColor = t.accent; badge.style.color = t.accent; }
}

function applySubStyle() {
  var t = currentWmTheme;
  var sub = document.querySelector('#header .sub');
  if (sub) {
    sub.style.fontFamily = t.subFont;
    sub.style.color = t.subColor;
    sub.style.fontWeight = t.subWeight;
    sub.style.fontStyle = t.subItalic ? 'italic' : 'normal';
  }
}

window.toggleControlPanel = function() {
  var cluster = document.getElementById('control-cluster');
  var btn = document.getElementById('control-collapse-btn');
  cluster.classList.toggle('collapsed');
  var collapsed = cluster.classList.contains('collapsed');
  btn.textContent = collapsed ? '\u25B2 CONTROLS' : '\u25BC HIDE';
};

window.toggleStylePanel = function() {
  document.getElementById('style-panel').classList.toggle('open');
};

// ═══════════════════════════════════════════════════
// GO
// ═══════════════════════════════════════════════════
init();
</script>
